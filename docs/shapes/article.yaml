# A published written work — essay, news article, blog post, paper, newsletter.
# NOT necessarily a social post. "As We May Think" (1945) is an article with
# no engagement metrics. A blog post shared on HN is both an article AND a
# post — the skill tags it with both shapes.
#
# article and post are siblings, not parent-child. When something is both
# (a modern blog post with comments), it gets both tags.
#
# Example sources: Exa (web articles), Firecrawl, future RSS integration
article:
  plural: articles
  subtitle: author
  fields:
    wordCount:        integer
    readingTime:      integer   # estimated minutes
    section:           string    # e.g. "Technology", "Opinion", "Science"
    language:          string    # ISO 639-1 (e.g. en, es, ja)
  relations:
    publisher:         organization
    publishedIn:      website
  prior_art:
    - source: schema.org/Article
      url: https://schema.org/Article
      notes: >-
        Our wordCount = wordCount; section = articleSection; language =
        inLanguage; publisher matches; publishedIn(website) ≈
        isPartOf/publisher. readingTime has no direct property (often
        timeRequired in ISO 8601 duration).
    - source: JATS (NISO Z39.96, Journal Article Tag Suite)
      url: https://jats.nlm.nih.gov/
      notes: >-
        Scholarly-article XML standard. Our section ≈
        <article-categories>/<subj-group>; language ≈ @xml:lang; publisher ≈
        <publisher-name>. Heavier than needed for non-scholarly content.
    - source: OpenGraph article:* properties
      url: https://ogp.me/#type_article
      notes: >-
        Web-article metadata in the wild. Our section ≈ article:section;
        publisher ≈ article:publisher; language ≈ og:locale. No
        wordCount/readingTime in OG.
