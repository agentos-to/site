# A piece of published content — a Reddit submission, HN story, YouTube upload,
# tweet, etc. Posts can contain media (videos, images, files). A comment is
# just a post that replies_to another post. Reviews extend post via `also`.
post:
  plural: posts
  identity: [platform, id]
  subtitle: author
  fields:
    externalUrl:      url       # linked URL (for link posts)
    postType:         string    # story, comment, job, poll, etc.
  relations:
    postedBy:         account   # who posted it
    publish:           community # subreddit, group, or channel it was posted to
    repliesTo:        post      # parent post (makes this a "comment")
    replies:          post[]    # nested comment tree (inverse of repliesTo)
    contains:          video[]   # embedded videos
    media:             image[]   # embedded images
    attachment:        file[]    # attached files
  prior_art:
    - source: ActivityStreams 2.0 (Note/Article + Create)
      url: https://www.w3.org/TR/activitystreams-vocabulary/
      notes: >-
        Fediverse post model. Our postedBy ≈ actor/attributedTo;
        publish(community) ≈ audience/to; repliesTo/replies ≈
        inReplyTo/replies; media/attachment ≈ attachment.
    - source: OpenGraph protocol
      url: https://ogp.me/
      notes: >-
        How posts surface when linked. Our externalUrl + media[] correspond to
        og:url and og:image/og:video; postType loosely parallels og:type
        (article, video).
    - source: ATProto app.bsky.feed.post
      url: https://atproto.com/lexicons/app-bsky-feed
      notes: >-
        Modern practical lexicon. Our repliesTo ≈ reply.parent; media ≈
        embed.images; externalUrl ≈ embed.external.
