# A financial transaction — credit card charge, bank transfer, etc.
transaction:
  plural: transactions
  identity: [platform, id]
  subtitle: category
  fields:
    amount:            number    # positive = credit, negative = debit
    currency:          string
    balance:           number    # account balance after this transaction
    category:          string    # spending category (e.g. "food", "travel")
    postingDate:      datetime  # when the bank posted it (vs. datePublished = transaction date)
    pending:           boolean
    recurring:         boolean
    notes:             string
    type:              string    # debit, credit, transfer, etc.
    details:           json
  relations:
    account:           account   # the financial account this posted to
  prior_art:
    - source: OFX (Open Financial Exchange) STMTTRN
      url: https://financialdataexchange.org/ofx
      notes: >-
        Direct source. Our amount/type/postingDate/balance map to STMTTRN
        TRNAMT/TRNTYPE/DTPOSTED/BALAMT.
    - source: ISO 20022 payments messaging
      url: https://www.iso20022.org/
      notes: >-
        Modern bank-messaging. Our currency = Ccy; category ≈ purpose code;
        details ≈ RemittanceInformation.
    - source: Plaid Transactions API
      url: https://plaid.com/docs/api/products/transactions/
      notes: >-
        Practical mirror. Our category/pending/recurring/notes match Plaid's
        category/pending/personal_finance_category/name fields.
