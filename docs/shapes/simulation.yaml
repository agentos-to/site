# A simulation — an isolated runtime where an agent runs. The "VM"
# to a memex's "disk image." Loads a memex, applies governor rules,
# and runs an agent in a controlled environment.
#
# Simulations provide isolation: writes go to a fork overlay, not the
# original memex. The user reviews changes and merges selectively —
# like a pull request for your knowledge graph.
#
# Examples: research-agent (forked joe.db + astronomy.db read-only),
# legal-review (forked joe.db + law.db read-only)
simulation:
  plural: simulations
  subtitle: status
  icon: shield
  fields:
    status:           string     # running, frozen, killed, completed
    profile:          string     # governor profile name
    task:             text       # what the agent was asked to do
    graphMode:        string     # fork, live, isolated
    startedAt:        datetime
    endedAt:          datetime
    actionCount:      integer    # total actions taken
    writeCount:       integer    # writes to the fork overlay
  relations:
    primaryMemex:      memex           # the memex being written to (fork/live)
    mountedMemex:      memex[]         # additional read-only memex
    agent:             agent
    tether:            hardware        # physical kill switch
    forkedFrom:        simulation      # if this is a parallel run
    startedBy:         person
