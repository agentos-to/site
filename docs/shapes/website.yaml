# A published website (not a single page — see webpage for that).
# Websites are created/managed by the here.now publishing skill.
#
# Example sources: here.now
website:
  plural: websites
  identity: url
  subtitle: url
  fields:
    status:            string    # active, pending
    versionId:        string    # current deployment version
    expiresAt:        datetime  # when an anonymous site auto-expires
    anonymous:         boolean   # true if published without an account
    claimToken:       string    # token to claim an anonymous site
    claimUrl:         url
  relations:
    domain:            domain
    ownedBy:          organization
  prior_art:
    - source: schema.org/WebSite
      url: https://schema.org/WebSite
      notes: >-
        Our url-as-identity matches; ownedBy ≈ publisher; domain relation ≈
        url host.
    - source: WHOIS (RFC 3912)
      url: https://datatracker.ietf.org/doc/html/rfc3912
      notes: >-
        Our expiresAt/domain source from WHOIS records; claimToken has no
        direct WHOIS peer (HERE.NOW-specific).
    - source: RFC 7033 WebFinger (host-meta)
      url: https://datatracker.ietf.org/doc/html/rfc7033
      notes: >-
        Website metadata discovery. Our claimUrl parallels
        /.well-known/host-meta patterns.
