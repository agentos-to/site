# A commercial airline. Created from flight search results.
#
# Example sources: SerpAPI (flight search)
airline:
  plural: airlines
  identity: iataCode
  subtitle: iataCode
  also: [organization]  # an airline is also an organization
  fields:
    iataCode:         string    # 2-letter code (e.g. UA, DL, AA)
    icaoCode:         string    # 3-letter code (e.g. UAL, DAL, AAL)
    callsign:          string    # radio callsign (e.g. "UNITED", "DELTA")
    country:           string
    alliance:          string    # e.g. Star Alliance, oneworld, SkyTeam
  prior_art:
    - source: IATA Airline Designators
      url: https://www.iata.org/en/publications/directories/code-search/
      notes: >-
        iataCode is 2-letter (UA, DL); icaoCode is 3-letter (UAL, DAL);
        callsign is radio callsign (UNITED). Full IATA/ICAO alignment.
    - source: schema.org/Airline
      url: https://schema.org/Airline
      notes: >-
        schema.org's Airline is an Organization subtype. Our alliance is a
        free field; schema.org doesn't model it.
