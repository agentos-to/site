# A software application — web app, desktop app, mobile app, CLI tool.
# Software is also a product, but with additional fields for platforms,
# versions, and runtime requirements.
#
# Examples: Gmail, Cursor, Slack, yt-dlp, agentOS itself
software:
  plural: software
  identity: url
  subtitle: text
  also: [product]     # software is also a product
  fields:
    version:           string    # current/latest version
    license:           string    # SPDX identifier (e.g. MIT, proprietary)
    platform:          string[]  # web, macos, windows, linux, ios, android
    openSource:       boolean
    repositoryUrl:    url       # source code URL
  relations:
    developer:         organization  # who makes it
    repository:        repository    # source code repo (if open source)
  prior_art:
    - source: schema.org/SoftwareApplication
      url: https://schema.org/SoftwareApplication
      notes: >-
        Our version = softwareVersion; license matches; platform[] ≈
        operatingSystem; developer = creator/author.
    - source: SPDX License List
      url: https://spdx.org/licenses/
      notes: >-
        Our license values are canonical SPDX identifiers.
    - source: schema.org/SoftwareSourceCode
      url: https://schema.org/SoftwareSourceCode
      notes: >-
        Our repositoryUrl ≈ codeRepository; openSource implied by SPDX-license
        + codeRepository presence.
