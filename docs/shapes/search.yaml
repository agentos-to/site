# A search query and its results. Every search is a graph entity with click
# tracking — re-searching shows previously-found results first.
#
# Example sources: location system (cross-scheme search)
search:
  plural: searches
  identity: [query]
  subtitle: query
  icon: magnifying-glass
  fields:
    query:            string    # the search text
    searchedAt:       datetime  # last time this query was executed
    searchCount:      integer   # how many times this query has been run
    resultCount:      integer   # total results from last execution
  # Results are --found--> edges to any entity (not a typed relation, since
  # search results can be any shape). Edge carries: click_count, first_seen, rank.
  prior_art:
    - source: OpenSearch Description (Url templates)
      url: https://github.com/dewitt/opensearch/blob/master/opensearch-1-1-draft-6.md
      notes: >-
        Our query field is the searchTerm in OpenSearch's Url template.
        resultCount ≈ totalResults header.
    - source: schema.org/SearchAction
      url: https://schema.org/SearchAction
      notes: >-
        Our query + searchedAt ≈ SearchAction.query + startTime. searchCount
        is AgentOS-specific (reuse telemetry).
