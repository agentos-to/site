# A notable quote. Attribution is a graph relationship, not a field —
# a document --contains--> the quote, a person --authored--> the document.
# The provenance chain IS the attribution. No spokenBy needed.
#
# Freeform edges handle everything:
#   document/book/article --contains--> quote
#   person --attributed--> quote (when we know who said it)
#   quote --inspired--> anything
#
# Example sources: Goodreads, RFCs, papers, talks, podcasts, interviews
quote:
  plural: quotes
  fields:
    context:           string    # when/where it was said, any extra notes
    year:              integer   # year of first known appearance
  prior_art:
    - source: schema.org/Quotation
      url: https://schema.org/Quotation
      notes: >-
        Our context ≈ about; year ≈ datePublished. schema.org models
        spokenByCharacter/creator — we model attribution via graph edges
        instead.
    - source: Wikiquote data model
      url: https://en.wikiquote.org/wiki/Help:Sources
      notes: >-
        Practical canonical quote source. Our provenance-via-edges (document
        --contains--> quote --attributedTo--> person) matches Wikiquote's
        source-citation discipline.
