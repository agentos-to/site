# A scheduled, bookable group activity — gym classes, workshops, courses.
# Has capacity (how many can attend) and optionally tracks spots remaining.
#
# Not to be confused with a meeting (1:1 or small group, calendar-driven)
# or a conference (large, multi-track). A class has an instructor, a fixed
# capacity, and is typically part of a recurring schedule.
#
# Example sources: Austin Boulder Project, Mindbody, future gym/studio integrations
class:
  plural: classes
  subtitle: activityType
  also: [event]
  fields:
    activityType:     string    # yoga, climbing, fitness, barre, etc.
    capacity:          integer   # max attendees
    spotsRemaining:   integer   # current availability
    isFull:           boolean
  relations:
    instructor:        person    # who teaches/leads the class
    venue:             place     # specific room/studio within a location
  prior_art:
    - source: schema.org/EducationEvent
      url: https://schema.org/EducationEvent
      notes: >-
        schema.org's closest peer for a bookable class. Our instructor =
        performer; capacity = maximumAttendeeCapacity; spotsRemaining ≈
        remainingAttendeeCapacity.
    - source: schema.org/ExerciseAction
      url: https://schema.org/ExerciseAction
      notes: >-
        Fitness-specific vocabulary: activityType ≈ exerciseType; venue
        matches directly as location.
    - source: Mindbody Public API (class schedules)
      url: https://developers.mindbodyonline.com/PublicDocumentation/V6
      notes: >-
        Practical API mirror. Our capacity/spotsRemaining/isFull come from
        Mindbody's MaxCapacity/TotalBooked/IsWaitlistAvailable.
