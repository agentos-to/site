# A consumer brand. Extracted from product listings.
#
# Example sources: Amazon
brand:
  plural: brands
  identity: url
  subtitle: tagline
  fields:
    tagline:           string
    founded:           datetime
    country:           string
  relations:
    ownedBy:          organization
    website:           website
  prior_art:
    - source: schema.org/Brand
      url: https://schema.org/Brand
      notes: >-
        Our tagline ≈ slogan; founded = foundingDate; ownedBy ≈
        parentOrganization (on the owning Organization).
    - source: Wikidata (Brand, Q431289)
      url: https://www.wikidata.org/wiki/Q431289
      notes: >-
        Cross-reference identity for dedupe. country maps to P17 (country);
        founded to P571 (inception); ownedBy to P127 (owned by).
