# An aircraft type (not an individual plane). Linked from flight search results.
#
# Example sources: SerpAPI (flight search)
aircraft:
  plural: aircraft
  identity: icaoCode
  subtitle: model
  also: [product]     # an aircraft is also a product
  fields:
    model:             string
    variant:           string
    seatCapacity:     integer
    rangeKm:          integer
    iataCode:         string    # 3-letter type code (e.g. 738, 77W)
    icaoCode:         string    # 4-letter type code (e.g. B738, B77W)
  relations:
    manufacturer:      organization
  prior_art:
    - source: ICAO Aircraft Type Designators (Doc 8643)
      url: https://www.icao.int/publications/DOC8643/Pages/Search.aspx
      notes: >-
        Our icaoCode is the canonical 4-char type code (B738, A320); iataCode
        is the 3-char IATA equivalent (738, 320).
    - source: schema.org/Vehicle
      url: https://schema.org/Vehicle
      notes: >-
        Our model/seatCapacity map to vehicleModelDate/vehicleSeatingCapacity;
        manufacturer matches directly.
