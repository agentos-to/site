# An airport. Created from flight search results and linked to flights.
#
# Example sources: SerpAPI (flight search)
airport:
  plural: airports
  identity: iataCode
  subtitle: iataCode
  fields:
    iataCode:         string    # 3-letter code (e.g. LAX, JFK, SFO)
    icaoCode:         string    # 4-letter code (e.g. KLAX, KJFK, KSFO)
    city:              string
    country:           string
    countryCode:      string    # ISO 3166-1 alpha-2 (e.g. US, GB)
    timezone:          string    # IANA timezone (e.g. America/Los_Angeles)
    elevationFt:      integer
    terminalCount:    integer
  relations:
    location:          place
    operator:          organization
  prior_art:
    - source: IATA/ICAO Airport Codes
      url: https://www.iata.org/en/publications/directories/code-search/
      notes: >-
        iataCode is 3-letter (LAX, JFK); icaoCode is 4-letter (KLAX, KJFK).
        Canonical identifiers for global airport routing.
    - source: schema.org/Airport
      url: https://schema.org/Airport
      notes: >-
        Our iataCode/icaoCode = iataCode/icaoCode; city/country = address
        fields; elevationFt ≈ elevation. Direct alignment.
    - source: OurAirports open dataset
      url: https://ourairports.com/data/
      notes: >-
        Practical open dataset covering terminalCount, elevation, and country
        codes (ISO 3166-1) aligning with our countryCode field.
