# A content source — where skills, themes, shapes, and wallpapers live.
# Sources are like Cydia repos, Homebrew taps, or APT sources.
#
# Identity: address — the canonical location (filesystem path, git URL, or HTTP URL).
# Two entries pointing to the same address are the same source.
#
# Platform tells the engine which scanner to use:
# - "agentos" scans for skills/, themes/, apps/, shapes/, wallpapers/ subdirs
# - Future: homebrew, apt, synology, etc.
source:
  plural: sources
  identity: address
  subtitle: sourceId
  icon: "\U0001F4E6"
  fields:
    sourceId:          string    # namespace prefix: "community", "joes", "retro-pack"
    address:           string    # canonical location: filesystem path, git URL, or HTTP URL
    platform:          string    # scanner type: "agentos", "homebrew", "apt", "synology"
    enabled:           boolean
    description:       text
    lastSynced:       datetime  # when items were last scanned from this source
  relations:
    folder:            folder    # local sources → the folder entity at this path
  prior_art:
    - source: Homebrew Taps
      url: https://docs.brew.sh/Taps
      notes: >-
        Direct precedent. Our sourceId/address match tap name/URL; our
        platform=agentos parallels tap formulae discovery.
    - source: Cydia / Sileo (APT repos for iOS)
      url: https://wiki.theapebox.com/index.php/Package_Management
      notes: >-
        Namespaced third-party source model. Our sourceId prefix is the Cydia
        repo-namespace pattern.
    - source: Debian APT sources.list
      url: https://wiki.debian.org/SourcesList
      notes: >-
        Canonical third-party source mechanism. Our enabled flag parallels APT
        source enable/disable; lastSynced ≈ apt-get update timestamp.
