# A file — source code, attachment, download, or any discrete digital artifact.
# Base type for image. Covers repo files (GitHub, Cursor), email attachments
# (Mimestream), filesystem entries, and downloads.
file:
  plural: files
  subtitle: path
  fields:
    filename:          string    # original filename with extension
    mimeType:         string    # IANA MIME type (e.g. application/pdf, text/plain)
    size:              integer   # file size in bytes
    path:              string    # file path within repository, workspace, or filesystem
    format:            string    # human-readable format (e.g. "PDF", "DOCX")
    encoding:          string    # content encoding (e.g. base64, utf-8)
    lineCount:        integer   # line count (text files)
    kind:              string    # file, dir, symlink, submodule
    sha:               string    # git blob SHA (repo files)
  relations:
    attachedTo:       message   # email/message this file was attached to
    repository:        repository
  prior_art:
    - source: IANA Media Types (RFC 6838)
      url: https://datatracker.ietf.org/doc/html/rfc6838
      notes: >-
        Our mimeType follows type/subtype syntax (text/plain,
        application/pdf). Canonical source for format identification.
    - source: schema.org/DigitalDocument
      url: https://schema.org/DigitalDocument
      notes: >-
        Our filename ≈ name; size ≈ contentSize; mimeType ≈ encodingFormat.
    - source: Git Internals (blob objects)
      url: https://git-scm.com/book/en/v2/Git-Internals-Git-Objects
      notes: >-
        Our sha is a Git blob SHA-1 (40-hex). Git's content-addressable model
        underlies our repo-file identity.
