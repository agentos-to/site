# A vehicle — the physical object. VIN, specs, color.
# Ownership, registration, and purchase are events/relationships, not
# properties of the vehicle. A car doesn't "become sold" — it changes
# hands. Plates belong to a registration, not the car.
#
# Ownership history: person --owns--> vehicle (edge with start/end dates)
# Purchase: a transaction between buyer, seller, and vehicle
# Registration: vehicle registered in a jurisdiction (edge with plate, dates)
#
# Example sources: manual entry, document extraction
vehicle:
  plural: vehicles
  identity: vin
  subtitle: vin
  also: [product]     # a vehicle is also a product
  fields:
    vin:               string    # Vehicle Identification Number (17 chars)
    year:              integer   # model year
    model:             string    # model name (e.g. Accord, A4)
    trim:              string    # trim level (e.g. EX-L, Premium)
    bodyType:         string    # sedan, SUV, truck, etc.
    fuelType:         string    # gas, diesel, hybrid, electric
    transmission:      string    # automatic, manual, CVT, e-CVT
    drivetrain:        string    # FWD, RWD, AWD, 4WD
    color:             string
    odometer:          integer   # miles or km (last known)
  relations:
    manufacturer:      organization
  prior_art:
    - source: ISO 3779 — VIN (Vehicle Identification Number)
      url: https://www.iso.org/standard/52200.html
      notes: >-
        Canonical 17-char VIN. Our vin field uses ISO 3779 syntax (WMI + VDS +
        VIS).
    - source: schema.org/Vehicle
      url: https://schema.org/Vehicle
      notes: >-
        Our year ≈ vehicleModelDate; model = model; fuelType = fuelType;
        bodyType = bodyType; drivetrain = driveWheelConfiguration.
    - source: NHTSA vPIC VIN Decoder API
      url: https://vpic.nhtsa.dot.gov/api/
      notes: >-
        Practical decoder for year/model/trim/bodyType/fuelType from VIN. Our
        fields align with vPIC's decoded result.
