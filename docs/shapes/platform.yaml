# A service that users interact with — Amazon, Gmail, Reddit, WhatsApp.
# Extends software (which extends product). A platform has accounts,
# produces data, and is the context for entity identity.
#
# Not all skills connect to platforms — some connect to plain software
# or products. The "platform" tag is for services that host user data.
#
# Example sources: seeded by skills at load time
platform:
  plural: platforms
  also: [software]
  identity: website
  subtitle: website
  fields:
    website:           url       # https://amazon.com, https://gmail.com
    platformType:     string    # marketplace, social, messaging, productivity, finance
  prior_art:
    - source: schema.org/SoftwareApplication
      url: https://schema.org/SoftwareApplication
      notes: >-
        Our website ≈ url; platformType ≈ applicationCategory.
    - source: schema.org/WebSite
      url: https://schema.org/WebSite
      notes: >-
        A platform often IS a website. Our website field is canonical identity
        — matches schema.org's url/sameAs.
