# A filesystem directory or workspace. Used to track project roots,
# working directories, and document collections.
#
# Example sources: agentOS engine (session working directories), filesystem
folder:
  plural: folders
  identity: path
  subtitle: path
  fields:
    path:              string    # absolute filesystem path
    workspaceType:    string    # git, node, python, rust, etc.
    hasReadme:        boolean
  relations:
    repository:        repository  # git repo at this path
    contains:          file[]
  prior_art:
    - source: POSIX / Single Unix Specification
      url: https://pubs.opengroup.org/onlinepubs/9699919799/basedefs/V1_chap03.html
      notes: >-
        Our path is a POSIX pathname. hasReadme is AgentOS-specific (README
        convention from repos).
    - source: schema.org/DataCatalog
      url: https://schema.org/DataCatalog
      notes: >-
        Folder-as-collection loose fit. contains(file[]) ≈ hasPart.
