# agent.* ops — schema resolution.
#
# agent.resolve_tools walks apps' `provides` entries to build provider-format
# tool definitions. Handler lives in agentos-core.

agent.resolve_tools:
  doc: "Resolve app-scoped tool refs (\"app.operation\") to provider-native tool defs."
  doc_full: |
    Resolve a list of app-scoped tool refs (`"app.operation"`) into
    provider-native tool definitions. Used by SDK agent loops that need
    to pass the resolved tool list into a chat call.

    Args:
        tools: list of `"app.operation"` strings.

    Returns:
        {tools: [tool_def, …]}.
  request:
    tools: { type: "string[]", doc: "Tool references (app.operation)." }
  response:
    tools: { type: "json[]", doc: "Resolved tool definitions, one per input ref (in order)." }
  effects: []
