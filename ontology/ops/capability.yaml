# capability.* ops — generic capability dispatch.
#
# Apps and skills never name each other. Consumers ask for a capability;
# the engine walks @provides(X) skills, picks one, dispatches.

capability.call:
  doc: "Match a @provides(X) skill and dispatch its tool, returning the tool's result unchanged."
  doc_full: |
    Matchmake a provider for capability `name` and dispatch `verb` on it.
    The tool's return value is passed through unchanged — no envelope.

    Used by SDK wrappers (`credentials.retrieve`, `llm.oneshot`, etc.)
    and by skills that consume a capability across skill boundaries
    without naming the provider.

    Args:
        name: capability name (e.g. `"login_credentials"`, `"llm"`).
        verb: tool to invoke on the picked provider. Defaults to the
              provider's declared `via`.
        params: parameters forwarded to the picked tool, unchanged.
        skill: optional skill-id override; forces a specific provider.

    Returns:
        The picked tool's return value, unchanged.
  trace_span: true
  request:
    name:   { type: "string",  doc: "Capability name to match." }
    verb:   { type: "string?", doc: "Tool-name override; defaults to the provider's declared via." }
    params: { type: "json",    default: null, doc: "Parameters for the picked tool. Passed through unchanged." }
    skill:  { type: "string?", doc: "Skill-id override; forces a specific provider." }
  response: { type: "json", doc: "The picked tool's return value, unchanged — no envelope." }
  effects: []

capability.list_providers:
  doc: "List every @provides(name) provider with its ranking and credential state."
  doc_full: |
    Enumerate skills that declared `@provides(name, ...)`. Returns the
    ranked candidate list without dispatching any tool — useful for
    introspection, provider selection, or iterating providers with
    per-provider fallback logic in skill code.

    Args:
        name: capability name.
        model: optional model filter for `llm` capability matches.

    Returns:
        `{providers: [{skill_id, via, cred_state, urls?}, ...]}`.
  request:
    name:  { type: "string",  doc: "Capability name to enumerate providers for." }
    model: { type: "string?", doc: "Optional model filter for llm capability matches." }
  response:
    providers: { type: "provider[]", doc: "All @provides(name) providers, ranked." }
  effects: []

# Named record types referenced by this file's ops — the "every type named"
# rule: op req/resp carry no anonymous inline structs.
types:
  provider:
    skill_id:   { type: "string",    doc: "Skill id that declared @provides(name, ...)." }
    via:        { type: "string",    doc: "Operation name (via) on the skill that would be invoked." }
    cred_state: { type: "string",    doc: "Credential state: not_required, present, or missing." }
    urls:       { type: "string[]?", doc: "Optional URL patterns declared on the @provides entry." }
