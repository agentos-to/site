# Default apps — `app` gains `defaultRoute` (the shell address a new
# window opens at when the app is launched; absent → `?app=<id>`), and
# `defaults_to` widens its source kind from `service` to `node` so
# shape-def nodes can carry the user's "which app opens this kind of
# thing" override (open widening — existing service rows already valid,
# no op needed). Purely additive.

from: sha256:a6690454cf749305c6cc926fb009f31e6126c8080cac1064e12ca2065935b6cc
to:   sha256:1a6388d105919912536e83ea75369aee6447f8c55c7801699791a0e74bf22b96
doc:  "Default apps — app.defaultRoute val; defaults_to widens source to node."

ops:
  - add_field: {shape: app, name: defaultRoute, type: string}
