# Phase 0.5 — Raptor delete of four aspirational shapes that never had
# instances in the live graph: simulation, memex, hardware, and agent.
#
# These were placeholder shapes from the original design pass; they
# carried no real semantics distinct from existing shapes. Deleting
# them simplified the ontology before the link-typing work started.
#
# The shape YAMLs were removed from `platform/ontology/shapes/` and
# the engine's dead `local-agent` node + `agent` shape-def node were
# cleared from the live graph (`core/crates/core/src/sources/identity.rs`
# lost AGENT_ID / find_agent / get_agent_id).
#
# This migration replays cleanly against any older artifact: if it
# happens to contain nodes tagged with one of these shapes, they get
# rewritten with the tag dropped (cascade lets the engine retain the
# node body so manual triage can recover it).

from: sha256:db362c1ff6533f9ddf4053610132bb87e4ffbf9b3c39538f051b96d36ab9eae9
to:   sha256:222e1d8acbb9703b1ea7830babe5ebadfeeef2e899de4eeedbaff291f5aff1e7
doc:  "Phase 0.5 — drop aspirational shapes (simulation, memex, hardware, agent)."

ops:
  - drop_node_type: {name: simulation, cascade: true}
  - drop_node_type: {name: memex,      cascade: true}
  - drop_node_type: {name: hardware,   cascade: true}
  - drop_node_type: {name: agent,      cascade: true}
