# Phase 1c.3-v2 underscore-suffix audit — 15 active-form link labels
# dropped in favor of their past-participle canonical peers, plus two
# semantic collapses (derives_from → derived_from; from_panel → part_of).
#
# Twelve of the drops are direction-flips: the active label stored
# `(parent, label, child)` whereas the canonical past-participle stores
# `(child, canonical, parent)`. `flip_link` rewrites both the label and
# the row direction in one pass.
#
# Three are plain renames (same direction): `replies → replies_to`
# (read on a post-thread reads the same direction either way),
# `derives_from → derived_from` (commits both ways), and
# `from_panel → part_of` (observation/biomarker both belong to a panel).
#
# Companion schema-level changes shipped with the same commit
# (`d1cf549` + `597815b4`) but don't require migration ops:
#   - 10 canonical link YAMLs widened their from_kind / to_kind to
#     absorb the dropped active forms' source/target shapes (open
#     widening; existing rows already valid under the wider kinds).
#   - Reverse-accessor declarations re-added to three shape YAMLs
#     (post.replies, task.has_subtask + blocks, place.offers) for the
#     skill auto-link inference fix (platform `1b270b2`, core `bdd2a099`).

from: sha256:4fc517c06d4276b20562b5b10ae27e67b00f45ae2a30e615813dea6b6e84d0f1
to:   sha256:31429def666e3410fe9fcdf2deefe42cffb37cef566f4b18d984c3f0c91aa87c
doc:  "Phase 1c.3-v2 audit — drop 15 active-form labels, fold derives_from + from_panel."

ops:
  # ── Direction flips (active → past-participle canonical) ─────────────
  - flip_link: {from: attaches,         to: attached_to}
  - flip_link: {from: authenticates,    to: authenticated_via}
  - flip_link: {from: hosts,            to: hosted_by}
  - flip_link: {from: invokes,          to: invoked_by}
  - flip_link: {from: offers,           to: offered_by}
  - flip_link: {from: owns,             to: owned_by}
  - flip_link: {from: has_subtask,      to: subtask_of}
  - flip_link: {from: aired,            to: aired_in}
  - flip_link: {from: blocks,           to: blocked_by}
  - flip_link: {from: follows,          to: followed_by}
  - flip_link: {from: organized,        to: organized_by}
  - flip_link: {from: with_participant, to: attended}

  # ── Plain renames (same direction) ───────────────────────────────────
  - rename_link: {from: replies,        to: replies_to}
  - rename_link: {from: derives_from,   to: derived_from}
  - rename_link: {from: from_panel,     to: part_of}
