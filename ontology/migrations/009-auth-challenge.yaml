# The account protocol — `auth_challenge` joins the ontology, `app`
# gains its account-ops val.
#
# A typed "human must act" login result: a Unicode-QR / consent-URL /
# mailed-code challenge that renders as text on every agent surface.
# `app.account` carries the engine-stamped `@account.<role>` op names
# ({check?, login?, logout?, profile?}) so the shell dispatches sign-in
# through declared metadata. Purely additive — no instances of either
# exist anywhere yet.

from: sha256:feccf4af84836d6f479a7a85a1d5ca62d9f76ac571ffe77b3dff578c46a1ddfd
to:   sha256:deff4ffdeffe48302b7e697d8bc7e3071076c52b17fc05320a78a5f24e9a76ff
doc:  "Account protocol — auth_challenge result shape + app.account ops val."

ops:
  - add_node_type: {name: auth_challenge}
  - add_field: {shape: app, name: account, type: json}
