# Single-form link `defaults_to` (Pattern 3). Stem = storage label.
# Sources: service, shape
# Targets: app
#
# The user's standing answer to "which app handles this?" — XP's "Set
# Program Access and Defaults", as graph state. Two source kinds, one
# semantics:
#
#   service —defaults_to→ app   which provider answers a brokered call.
#                               Matchmaking resolves this link first; the
#                               usual walk covers services with no pick.
#   shape   —defaults_to→ app   which app a NEW window wears when a node
#                               of this shape is opened (the edge lives
#                               on the shape-def node). Absent → derived
#                               from the apps' own `handles` declarations
#                               (a specific handler beats the `*`
#                               universal navigator).
#
# At most one default per source node: the write path replaces the
# existing link rather than accumulating. System-app targets live in the
# read-only System volume, so the edge is cross-volume (`to:
# "system:help"`) — same direction `provided_by` points.
from: node
to: app
