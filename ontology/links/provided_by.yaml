# Single-form link `provided_by` (Pattern 3). Stem = storage label.
# Sources: service
# Targets: app
#
# Minted by the engine at app load from each app's own declarations
# (`@provides("web_search", via="search")`) — derived, never authored,
# cleared and rebuilt every boot. Rooted on the service node so the
# service carries its whole story (providers + the defaults_to pick)
# and so system apps — whose nodes live in the read-only System
# volume — are reachable as cross-volume targets (`to_volume`), the
# same direction defaults_to already points. `via` names the bound
# tool on the providing app: the service IS a shortcut to one of the
# app's own tools, plus a contract.
from: service
to: app
link_vals:
  via: string
  urls: json      # present → a URL-scoped upgrader (answers only its own
                  # URL patterns), never a candidate for the service-wide
                  # default. Absent → a general provider.
