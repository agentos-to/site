# Single-form link `provides` (Pattern 3). Stem = storage label.
# Sources: insurance_policy
# Targets: insurance_coverage
#
# A policy provides its benefit lines. Composition: each insurance_coverage
# belongs to exactly one policy (the policy carries the contract envelope;
# each coverage carries one line's financial terms). The reverse reading
# ("coverage provided by policy") is derived from this one stored direction.
from: insurance_policy
to: insurance_coverage
card: one_to_many
