# Single-form link `sold_by` (Pattern 3). Stem = storage label.
# Sources: insurance_policy
# Targets: actor
#
# The brand / agent / distributor a policy was bought through (GEICO sells
# renters insurance underwritten by Homesite). Typed `actor` (rule 4 —
# widest filler): usually an organization, but can be an individual broker.
# Null when the carrier sells direct (Cigna Global, RLI umbrella).
from: insurance_policy
to: actor
