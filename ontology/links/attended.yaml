# Single-form link `attended` (Pattern 3). Stem = storage label.
# Actor → thing-they-were-present-at: events, conversations, mcp_sessions.
# All "this entity was here" flows through this one label; the host's
# "who attended me?" reading is a reverse accessor.
# Sources: actor (person, organization, agent)
# Targets: conversation, event, mcp_session
from: actor
to: node
card: one_to_many
reverse_name: attendees
