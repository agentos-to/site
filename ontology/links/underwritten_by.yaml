# Single-form link `underwritten_by` (Pattern 3). Stem = storage label.
# Sources: insurance_policy
# Targets: organization
#
# The carrier that bears the risk and issued the policy number — the
# identity anchor for a policy (a policy number is namespaced by its
# carrier). Distinct from `sold_by` (the brand/agent you bought through)
# and `administered_by` (the claims TPA): GEICO may sell a policy that
# Homesite underwrites.
from: insurance_policy
to: organization
