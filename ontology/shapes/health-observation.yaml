# A single measured health value at a point in time — "LDL = 95 mg/dL on
# 2024-03-20". The measurement, not the definition (health-biomarker) and
# not the lab's catalog interval (health-reference-range).
#
# An observation always carries its own value, and the value's UCUM unit
# rides on the value itself — every memex val stores a unit alongside it,
# so there is no separate `unit` field. The value is meaningless without
# the unit (95 mg/dL is not 95 mmol/L). It links to its biomarker via a
# `measures` link.
#
# Reference range — TWO complementary mechanisms, on purpose:
#   1. SNAPSHOT fields (refLow / refHigh / refText) — the interval THIS
#      report actually printed, frozen onto the result. This is a
#      historical fact: it never changes, even if the lab later revises
#      its range. Always populated when the report stated a range.
#   2. An optional `reportedRange` link to a health-reference-range node,
#      set when that lab's interval is known as a first-class entity.
#      Lets you reconcile the result against the normalized range.
# The snapshot is the fact; the link is the enrichment. Both can coexist.
#
# `flag` (low / normal / high / critical) is DERIVED — a reader compares
# `value` against the range. Stored as an optional convenience only; it
# must never be the source of truth. Re-derive it; don't trust a frozen
# copy. (The "derive don't declare" principle.)
#
# `also: [result]` — an observation is a kind of result: a pointer to
# something found, with find-time metadata.
#
# `name` (inherited) is the display label, e.g. "LDL Cholesterol 95 mg/dL".
health-observation:
  plural: health-observations
  also: [result, event]         # the measurement IS an event — sample taken at a moment.
                                  # `also: [result]` covers the find-time metadata; event
                                  # covers the when. Rule 1.
  display:
    subtitle: startDate          # inherited from event — when the sample was taken
  fields:
    value:            number    # the measured quantity — 95, 1.24, 310; its UCUM unit rides on the val
    valueText:        string    # for non-numeric results — "Negative", "Reactive", "Trace"
                                  # When the sample was taken lives on event.startDate
                                  # (inherited via `also: [event]`), per rule 1.
    refLow:           number    # SNAPSHOT: reference low as printed on THIS report (unit on the val)
    refHigh:          number    # SNAPSHOT: reference high as printed on THIS report (unit on the val)
    refText:          string    # SNAPSHOT: verbatim range string from this specific report
    flag:             string    # DERIVED — low | normal | high | critical. Convenience only.
    status:           string    # FHIR status — final, preliminary, amended, corrected
    notes:            text      # lab comments or annotations on this specific result
  links:
    measures:         health-biomarker        # the biomarker this is a measurement of
    part_of:          health-panel            # the panel / draw this observation was part of
    evaluated_against:    health-reference-range  # the normalized interval this result was read against
    documented_in:         file                    # the source lab-report file on disk
    concerns:          person                  # whose body this was measured from
  prior_art:
    - source: HL7 FHIR R5 — Observation
      url: https://www.hl7.org/fhir/observation.html
      notes: >-
        The canonical resource for a measured value. value (with its
        UCUM unit) ≈ valueQuantity; effectiveDate ≈ effectiveDateTime;
        refLow/refHigh/refText ≈ the referenceRange backbone (the inline
        snapshot); flag ≈ interpretation; status ≈ status. `measures` ≈
        code resolved to a biomarker. FHIR has no normalized-range link —
        our `reportedRange` link adds that.
    - source: HL7 v2.x — OBX segment
      url: https://hl7-definition.caristix.com/v2/HL7v2.5/Segments/OBX
      notes: >-
        The legacy lab-result segment most labs still emit. OBX-5 (value)
        and OBX-6 (units) together ≈ our value-with-unit; OBX-7 (reference
        range), OBX-8 (abnormal flag), OBX-14 (datetime) map to refText/
        flag/effectiveDate. Confirms the snapshot field set against real
        lab feeds.
    - source: LOINC
      url: https://loinc.org/
      notes: >-
        The observation itself is not LOINC-coded — its `biomarker` is.
        The `measures` link carries the LOINC identity.
    - source: UCUM — Unified Code for Units of Measure
      url: https://ucum.org/
      notes: >-
        The unit on every numeric val (mg/dL, mmol/L, 10*3/uL) follows
        UCUM — the unit system FHIR mandates for Observation.valueQuantity,
        so observations round-trip into FHIR cleanly.
