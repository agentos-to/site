# A pointer into the graph — the universal shortcut. A bookmark is a
# name + a target; the target is the contract. Bookmarks are wrapped
# by `list --contains--> bookmark` links so the SAME bookmark can live
# in three lists (the desktop, the primary launcher, a user's pinned
# items) at three different positions with three different name
# overrides — the per-list metadata lives on the contains-link, not
# on the bookmark.
#
# Identity is `[target]`: one bookmark per addressable target. List
# membership comes from the --contains--> link, not from bookmark
# uniqueness. The bookmark's own icon comes from its target; per-list
# overrides ride on the contains-link as icon_override.
#
# `handle` makes a bookmark a resolvable symlink: `read({id: handle})`
# finds no literal node, derefs the handle → this bookmark → points_to
# target (across the mount boundary when points_to carries to_volume).
# A literal node id always wins (Unix collision rule); the handle only
# resolves a miss. One bookmark per target → at most one handle per node.
#
# A bookmark names a node (`points_to`) XOR a saved address (`address`)
# — never both, never neither. An address bookmark is a BeOS saved
# query: the payload is a serialized view route (`?q=raptor&…`), there
# is no node to point at, and opening it re-runs the query live —
# `read({id: handle})` binds the address to `data.list`, the shell
# navigates to it. The engine refuses a bookmark carrying both.
bookmark:
  plural: bookmarks
  # Identity is existential: the engine's delete cascade reads this list
  # and soft-deletes any bookmark whose points_to target is deleted — a
  # pointer with no target has no meaning. Restore brings them back as a
  # batch. (crates/graph/src/database.rs delete_node_cascade_on.)
  identity: [points_to]
  display:
    icon: bookmark
    subtitle: name
  fields:
    name:              string    # display name — may differ from target.name
                                  # (the user named the shortcut; the target
                                  # is the underlying thing).
    handle:            string    # optional address — a short, stable slug you
                                  # `read({id: handle})` by. The symlink name.
    address:           string    # saved-view payload — a serialized route
                                  # (`?group=facet:shape&q=raptor`). Mutually
                                  # exclusive with points_to: an address IS the
                                  # target, re-run live on every open.
  prior_art:
    - source: Browser bookmarks (Mosaic / Netscape Navigator hotlist)
      url: https://en.wikipedia.org/wiki/Bookmark_(digital)
      notes: >-
        Direct precedent. A bookmark is a name + a target; the target is
        the contract; the surface doesn't care what's behind it. We
        replace HTTP URLs with graph node references; everything else
        maps 1:1.
    - source: macOS alias / Windows .lnk file
      url: https://en.wikipedia.org/wiki/Alias_(Mac_OS)
      notes: >-
        OS-level shortcut primitive. Same shape: name + target. Per-
        instance position is handled by the parent folder/desktop in
        both — for us that lives on the contains-link.
    - source: Finder sidebar / Windows Explorer Quick Access
      url: https://support.apple.com/guide/mac-help/customize-the-finder-sidebar-mchlp3014/mac
      notes: >-
        OS file managers use a bookmark sidebar as their universal
        navigation primitive (My Computer, Documents, Network). We treat
        every shape the same way — bookmark to any graph node, no FS bias.
