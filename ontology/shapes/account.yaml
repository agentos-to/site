# A user's presence within a namespace — their GitHub handle, Gmail address,
# Mastodon @-handle, Chase bank login, etc.
#
# Identity is graph-native: (at, identifier). `at` is a relation to whichever
# entity owns the namespace (an organization, a product, or other software).
# `identifier` is the local handle within that namespace. The relation-keyed
# identity means rebrands (Twitter → X), bank mergers (First Republic → Chase),
# and instance migrations don't fragment accounts on string changes — the node
# persists, the edge persists with it.
account:
  plural: accounts
  identity: [at, identifier]
  subtitle: identifier
  fields:
    identifier:        string    # canonical key within `at`'s namespace
                                  # (e.g. an email for email-login services,
                                  # a handle for handle-login services)
    handle:            string    # display handle if differs from identifier
    displayName:      string
    display:           string    # short display label (auth-bridge contract; alias of displayName)
    email:             string    # normalized via `agentos.identity.normalize_email`
    phone:             string    # normalized via `agentos.identity.normalize_phone` (E.164)
    bio:               text
    accountType:      string    # user | bot | org | service_account
    color:             string
    isActive:         boolean
    joinedDate:       datetime
    lastActive:       datetime
    lastProfileFetch: datetime  # when `account.profile` last populated the node
    userId:            string    # service-stable internal ID — never changes
                                  # on rename/handle swap. Free-form string
                                  # (Amazon's numeric customerId, GitHub's
                                  # graphql node_id, etc.)
    issuer:            string    # hostname of the identity issuer
                                  # ("united.com", "accounts.google.com").
                                  # Usually the same as `at.url`'s host for
                                  # centralized services; diverges for OIDC /
                                  # federated cases where the token issuer
                                  # differs from the namespace operator.
    metadata:          json      # skill-namespaced freeform blob:
                                  # { amazon: { isPrime, marketplaceId },
                                  #   goodreads: { ... } }. The engine does
                                  # not introspect; skills read/write their
                                  # own namespace.
  relations:
    at:                actor     # the namespace this account exists within.
                                  # Target is the entity that "owns" the
                                  # namespace: an organization (Chase, GitHub
                                  # Inc), a product (github.com, hachyderm.io),
                                  # or other software. Required for identity.
    via:               product   # OPTIONAL: the software/product surface you
                                  # interact with at `at`. Often the same node
                                  # as `at` for centralized services. Distinct
                                  # for federated (at=instance, via=Mastodon).
    operator:          actor     # OPTIONAL: the actor running the namespace.
                                  # Self for self-hosted (operator=person).
                                  # Often `at` itself for orgs that are their
                                  # own operator.
    protocol:          protocol  # OPTIONAL: the protocol this account speaks
                                  # (e.g. ActivityPub for Mastodon accounts).
    owner:             person    # OPTIONAL: the human behind this account.
    authenticatedVia: account   # OPTIONAL: upstream credential-issuing
                                  # account (federated SSO).
    previousIdentity: account[] # OPTIONAL: prior identities this account
                                  # superseded (handle change, instance
                                  # migration, account merge).
    follows:           account[]
    followers:         account[]
  prior_art:
    - source: ActivityPub Actor model
      url: https://www.w3.org/TR/activitypub/
      notes: >-
        Account id is a URL; Server/Application/Operator are separate Actor
        objects. We adopt the same separation but ground each in graph
        nodes rather than URLs, so node lifecycle (rebrand, merge)
        propagates to all referencing accounts.
    - source: schema.org Offer.seller union
      url: https://schema.org/Offer
      notes: >-
        seller: Person | Organization. The `actor` shape (which `at` and
        `operator` target) is our existing union of person/org/agent —
        same pattern.
    - source: OpenID Connect Core 1.0 (`iss`/`sub`)
      url: https://openid.net/specs/openid-connect-core-1_0.html
      notes: >-
        OIDC keeps issuer as opaque URL because there's no shared graph
        across token issuers. We have a graph; we replace the URL with
        a graph node, gaining mutability and traversal at the cost of
        requiring a node to exist before an account can reference it.
        Trade is worth it.
    - source: WebFinger (RFC 7033)
      url: https://datatracker.ietf.org/doc/html/rfc7033
      notes: >-
        Resolves issuer+identifier pairs to profile metadata. Our
        identifier aligns with WebFinger's acct: URI scheme (user@host),
        but the `host` part becomes a graph node (not a string).
    - source: vCard 4.0 (RFC 6350)
      url: https://datatracker.ietf.org/doc/html/rfc6350
      notes: >-
        Defines displayName/email/phone/org in contact cards. We adopt
        vCard's contact semantics for the human-readable fields.
