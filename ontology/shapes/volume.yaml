# A mounted Volume — any named source of typed nodes the engine has
# attached to the Registry: a `.db` memex file, a YAML text volume, or a
# transport volume served live by an app (the host filesystem, a USB
# stick, a browser's data). The home graph is the always-mounted
# writeable Volume; it is the hardcoded constant. Every OTHER mount IS a
# `volume` node — one row per mount, persisted so the mount survives
# engine restart (`auto_mount: true`).
#
# Mount lifecycle is six steps; this shape captures the persisted state
# of step 5. See `core/_product/p2/realms-transports/plan.md`.
volume:
  plural: volumes
  display:
    subtitle: kind
  icon: drive
  fields:
    volume_id:   string    # Kebab-case slug — `joe-health`, `bible`. The
                            #   stable handle for `volume:` params + the
                            #   prefix in cross-volume edges (`to:
                            #   "joe-health:flpith"`). Derived from `name`
                            #   via `slugify` with collision dedup against
                            #   the live registry; stamped here so the UI
                            #   can recover it without round-tripping
                            #   through the mount registry.
    kind:        string    # the transport axis. "memex" — built-in (a graph
                            #   at rest the engine opens: a SQLite pool or a
                            #   materialized YAML dir; the fork is `source`).
                            #   "filesystem" — served live by the app that
                            #   announced it via @provides(volume_transport);
                            #   later: "browser" | "service" | "device".
    source:      string    # how a graph-backed volume was populated —
                            #   "sqlite" (a `.db` you author, direct write
                            #   path) or "yaml" (a YAML dir, materialized
                            #   into a throwaway cache, git is the write
                            #   path). The honest format name — the
                            #   materializer is `format::yaml`. Orthogonal to
                            #   `kind`: the materialize-on-change behavior keys
                            #   off this, so `kind` carries one fork (memex vs
                            #   transport), never provenance.
    address:     string    # the locator, transport-specific. memex: absolute
                            #   `.db` path. text: the YAML dir. filesystem:
                            #   the mount point ("/", "/Volumes/Backup").
    provider:    string    # transport volumes only — the app id that
                            #   announced this volume, stamped by the ENGINE
                            #   at announce time (never self-declared). A
                            #   volume's address only means something to the
                            #   app that announced it; browse dispatches
                            #   here, not through a fresh service walk.
    auto_mount:  boolean   # re-mount on engine boot. true by default for
                            #   mounts created via `data.mount`.
    readOnly:    boolean   # the transport refuses writes. Transport volumes
                            #   are read-only in v1 (the three read verbs are
                            #   the whole contract).
    removable:   boolean   # filesystem transport — a /Volumes/* mount (DMG,
                            #   USB) vs the internal disk; drives the eject
                            #   affordance + glyph.
    ejectable:   boolean   # can the user unmount this volume? false for the
                            #   core OS volumes (Home, System) the engine
                            #   manages; true for user-mounted pods. The
                            #   Unmount verb is hidden when false, and the
                            #   engine's unmount op refuses a false volume.
                            #   Distinct from `removable` (a physical-media
                            #   trait); `ejectable` is an ownership/policy
                            #   trait. Absent → treated as ejectable.
    totalBytes:  integer   # filesystem transport — capacity, from statvfs.
    freeBytes:   integer   # filesystem transport — free space, from statvfs.
    scope:       string    # "user" (default) — a memex/pod the user mounted,
                            #   owned + writable + ejectable. "system" — a
                            #   read-only volume the OS ships with itself
                            #   (System Docs), mounted at boot from content
                            #   embedded in the binary, never user-owned. The
                            #   split lets the shell group + style the two
                            #   differently (optical-disc icon for system).
    icon:        string    # per-instance display glyph (theme-icon name, e.g.
                            #   `drive-optical`). Comes from the volume's
                            #   `_meta.icon`; overrides the kind-derived
                            #   fallback in the sidebar.
    default_view: string   # the arrangement this volume ships with — a
                            #   serialized view-query fragment WITHOUT
                            #   `volume=` (e.g. `group=edge:contains`). Comes
                            #   from the volume's `_meta.default_view`; the
                            #   shell scopes it to this mount's slug and lands
                            #   there by default. Absent → the `facet:shape`
                            #   floor (what home, which has no `_meta`, gets).
                            #   A user view-pref overrides it.
  prior_art:
    - source: HDT (Header, Dictionary, Triples)
      url: https://www.rdfhdt.org/what-is-hdt/
      notes: >-
        RDF binary file format; one file = one queryable graph. The
        Header describes the dataset in its own vocabulary — same
        shapes-ride-along move as our embedded ontology.
    - source: Stardog Virtual Graphs
      url: https://docs.stardog.com/virtual-graphs/
      notes: >-
        Register an external source under a URI; query as a named graph.
        Our volume shape is the registration row; mount/unmount is the
        verb pair.
    - source: macOS Disk Utility / DMG
      url: https://support.apple.com/guide/disk-utility/welcome/mac
      notes: >-
        The UX mental model. A volume is an attached, browseable disk;
        the Finder shows it in the sidebar; eject detaches it without
        destroying the underlying file.
