# An AI model — LLM, embedding model, or other ML model.
#
# Identity: (at, name) — graph-native. `at` is a relation to the entity
# providing the model (an organization like Anthropic/OpenAI, or a product
# like ollama for self-hosted). The model node persists across provider
# rebrands or reorganizations.
model:
  plural: models
  identity: [at, name]
  display:
    icon: psychology
    subtitle: name
  fields:
    contextLength:    integer
    contextWindow:    integer   # alias for context_length (OpenRouter uses this name)
    maxOutput:        integer
    # Price is machine-readable so the engine can compute the cost of a call the
    # provider itself didn't price — the graph IS the deleted Rust price table's
    # replacement, never a constant. USD per 1,000,000 tokens; each provider's
    # list_models converts its native unit. A free/local model is 0, not absent.
    pricingInput:     number    # USD per 1M input tokens
    pricingOutput:    number    # USD per 1M output tokens
    modality:          string[]  # e.g., ["text", "vision"]
    modelType:        string    # e.g., "chat", "completion", "embedding"
    quantization:      string    # e.g., "Q4_K_M"
    quantizationLevel: string   # e.g., "Q4_0" (Ollama naming)
    size:              string    # e.g., "7B", "70B"
    parameterSize:    string    # e.g., "7.6B" (Ollama naming)
    format:            string    # e.g., "gguf"
    family:            string    # model family, e.g., "llama", "qwen"
    digest:            string    # content-addressable hash of model weights
  prior_art:
    - source: Hugging Face Model Cards
      url: https://huggingface.co/docs/hub/en/model-cards
      notes: >-
        Our provider/contextLength/modality/family/quantization/ parameterSize
        align with HF model-card metadata conventions.
    - source: Ollama /api/show + Modelfile
      url: https://github.com/ollama/ollama/blob/main/docs/modelfile.md
      notes: >-
        Our quantization/quantizationLevel/format/digest/parameterSize come
        directly from Ollama's show-model response.
    - source: OpenRouter Models API
      url: https://openrouter.ai/docs/models
      notes: >-
        Our contextLength/contextWindow/maxOutput/pricingInput/ pricingOutput
        mirror OpenRouter's model spec.
