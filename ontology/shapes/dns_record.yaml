# A DNS record for a domain. One domain has many records (A, CNAME, MX, TXT, etc.).
dns_record:
  plural: dns_records
  identity: [domain, recordType, recordName]
  subtitle: recordType
  fields:
    domain:            string
    recordName:       string    # subdomain part (e.g. "www", "@" for apex)
    recordType:       string    # A, AAAA, CNAME, MX, TXT, NS, etc.
    type:              string    # alias of recordType (Porkbun returns both; keep both surfaces for TypedDict ergonomics)
    ttl:               integer   # time-to-live in seconds
    priority:          integer   # MX record priority
    recordId:         string    # provider-specific record id (Porkbun, Cloudflare, etc.)
    values:            string[]  # one or more record values
  prior_art:
    - source: RFC 1035 (DNS)
      url: https://datatracker.ietf.org/doc/html/rfc1035
      notes: >-
        Foundational spec. Our domain/recordName/recordType/ttl/values map
        directly to NAME/TYPE/CLASS/TTL/RDATA.
    - source: RFC 7208 (SPF), RFC 6376 (DKIM), RFC 7489 (DMARC)
      url: https://datatracker.ietf.org/doc/html/rfc7208
      notes: >-
        TXT-record vocabularies that frequently populate our values[] for SPF,
        DKIM, and DMARC policy records.
