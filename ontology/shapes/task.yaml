# A work item — issue, ticket, or to-do. Supports hierarchy (parent/children)
# and dependency tracking (blocked_by/blocks).
task:
  plural: tasks
  identity: [at, id]
  also: [event]                  # a task IS event-shaped work — has a span (when started,
                                  # when finished). targetDate is the *target* deadline,
                                  # distinct from event.endDate (the actual end).
  display:
    icon: task_alt
    subtitle: state
  fields:
    remoteId:         string    # source-specific ID (e.g. PROJ-123, #456)
    priority:          integer   # 1 = highest (normalized across sources)
    state:             string
    labels:            string[]
    targetDate:       datetime  # target deadline — *distinct* from event.endDate, which
                                  # is the actual end. `startedAt` is event.startDate
                                  # (inherited via `also: [event]`).
    target:            json      # structured target spec ({date, time, timezone}) — Todoist-style
    parentId:         string    # denormalized parent task id (authoritative link is `parent`)
    projectId:        string    # denormalized project id (authoritative link is `project`)
  links:
    at_namespace:                actor     # the namespace this task lives within (Linear, Todoist, GitHub, etc.). Required for identity.
    assigned_to:       person
    in:           project
    references:        repository
    subtask_of:            task
    has_subtask:       task[]   # children — reverse-accessor reading of subtask_of
    blocked_by:        task[]
    blocks:            task[]   # tasks blocked by this one — reverse-accessor reading of blocked_by
  prior_art:
    - source: GitHub REST API — Issues
      url: https://docs.github.com/en/rest/issues/issues
      notes: >-
        Direct source. Our remoteId/state/labels/assignedTo/parent/
        children/blockedBy/blocks map to GitHub Issue + sub-issues + task-list
        tracking.
    - source: Linear GraphQL API — Issue
      url: https://developers.linear.app/docs/graphql/working-with-the-graphql-api
      notes: >-
        Practical canonical. Our priority/state/project/targetDate align with
        Linear's Issue model exactly.
    - source: Todoist REST API v2 — Tasks
      url: https://developer.todoist.com/rest/v2/
      notes: >-
        Consumer-grade task model. Our startedAt/targetDate ≈ created_at/due;
        labels match directly.
