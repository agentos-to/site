# An AgentOS user — the seat at this machine. Carries the user's
# preference state: pref:ui (render) and pref:system (engine behavior),
# resolved through the V6/V8 cascade alongside shape-def + instance
# overrides. Linked to a person via --identified_as--> when the user
# is human-identified; linkless users are anonymous.
#
# Distinct from `person` (universal human shape — schema.org / vCard)
# and `agent` (AI actor). person stays clean of AgentOS-specific
# fields; user is the carrier for everything OS-runtime.
#
# `prefsSchemas` (top-level metadata, not a per-instance field) declares
# the universal pref vocabulary for AgentOS users. The engine seeds
# these onto the USER shape-def node at boot; SettingsPanel reads them
# off the def, walks the entries, and writes resolved values back to
# the active user instance under `pref:<namespace>`. The cascade does
# the rest.
user:
  plural: users
  also: [actor]                # a user is an actor (alongside person, agent, organization)
  identity_any: [osUsername]   # one user per OS account on this machine
  fields:
    osUsername:        string    # OS account name ($USER)
    primaryUser:      boolean   # primary user on this machine (exactly one true)
  relations:
    identified_as:    person    # link to the human behind the seat (optional)
  prefsSchemas:
    ui:
      # User-level identity defaults (override at instance level for
      # per-view skinning, e.g. a fixed theme for one folder window).
      - key: themeId
        kind: select
        label: Theme
        description: Desktop theme — window chrome, fonts, sounds.
        group: Theme
        optionsShape: theme
        optionsValue: themeId
        optionsLabel: name
      - key: fontSize
        kind: number
        label: Font Size
        description: Base UI font size in pixels.
        group: Fonts
        min: 8
        max: 20
        step: 1
        default: 12
      # Background tab — owns the desktop background composition for
      # the active view (per-desktop overrides via the V6 cascade). The
      # wallpaper IMAGE flows through the slot system
      # (`pref:ui.slot.image.wallpaper` → asset id); the `Background`
      # group renderer (BackgroundPanel — universal, theme-paintable)
      # wires the picker via the slot helpers on GroupRenderProps. Only
      # the surrounding color + position knobs live in the schema here.
      - key: background.color
        kind: color
        label: Background Color
        description: Solid background tone for this view.
        group: Background
        tab: Background
        default: '#3A6EA5'
      - key: background.position
        kind: select
        label: Position
        description: How the wallpaper fills the surface.
        group: Background
        tab: Background
        default: fill
        options:
          - { value: fill, label: Fill }
          - { value: fit, label: Fit }
          - { value: stretch, label: Stretch }
          - { value: center, label: Center }
          - { value: tile, label: Tile }
      # Icons tab — desktop icon layout knobs. User-wide defaults,
      # written to user.pref:ui. Per-folder overrides happen through
      # that folder's own View menu (the cascade reads them at the
      # instance layer); Settings shows the user-default level only.
      # The Icons group on this tab also picks up the IconSlotPickers
      # suffix (back / forward / my-computer / control-panel /
      # folder-closed) wired via groupSuffixes in Settings.tsx.
      - key: icons.iconSize
        kind: number
        label: Icon Size
        description: Icon side length in pixels.
        group: Icons
        tab: Icons
        min: 24
        max: 96
        step: 4
        default: 32
      - key: icons.iconSpacing
        kind: number
        label: Icon Spacing
        description: Pixels between icon cells.
        group: Icons
        tab: Icons
        min: 4
        max: 48
        step: 2
        default: 8
      - key: icons.showIcons
        kind: boolean
        label: Show Icons
        description: Render icons on this view.
        group: Icons
        tab: Icons
        default: true
      - key: icons.startingCorner
        kind: select
        label: Starting Corner
        description: Where the first icon lands.
        group: Icons
        tab: Icons
        default: top-left
        options:
          - { value: top-left, label: Top Left }
          - { value: top-right, label: Top Right }
          - { value: bottom-left, label: Bottom Left }
          - { value: bottom-right, label: Bottom Right }
      - key: icons.flowDirection
        kind: select
        label: Flow Direction
        description: Whether icons fill columns or rows first.
        group: Icons
        tab: Icons
        default: vertical-first
        options:
          - { value: vertical-first, label: Vertical First }
          - { value: horizontal-first, label: Horizontal First }
  prior_art:
    - source: POSIX getpwuid (passwd database)
      url: https://pubs.opengroup.org/onlinepubs/9699919799/functions/getpwuid.html
      notes: >-
        The OS-level "user" — uid + login name + home dir. Our `osUsername`
        mirrors `pw_name`; identity-by-OS-account follows the same pattern.
        We diverge by separating the OS seat (`user`) from the human
        (`person`); POSIX conflates them.
    - source: schema.org/Audience
      url: https://schema.org/Audience
      notes: >-
        Loose fit. schema.org has no "OS user" concept — user accounts are
        product-specific. We model it explicitly because AgentOS is the
        product, and the user-as-pref-carrier is load-bearing.
    - source: macOS NSUserDefaults
      url: https://developer.apple.com/documentation/foundation/nsuserdefaults
      notes: >-
        The Apple model: per-user preference store, keyed by the OS account.
        Our `pref:ui` / `pref:system` blobs play the same role, but live in
        the graph (queryable, multi-process safe) rather than a plist file.
