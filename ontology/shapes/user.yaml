# An AgentOS user — the **seat** at this machine. Pure OS bookkeeping:
# which OS account ($USER) maps to which human, and whether it's the
# primary seat. The seat is the machine's plumbing, not the human's
# content — it lives on the **System volume**, read-only, projected from
# the canonical `engine.db` users row (same pattern as system apps). The
# user's *configuration* (theme, prefs, per-app settings) does NOT live
# here — it lives on a portable `settings` node in the home vault (see
# settings.yaml). That seam is what keeps System free of agent-writable
# content.
#
# Distinct from `person` (universal human shape — schema.org / vCard)
# and `agent` (AI actor). person stays clean of AgentOS-specific fields;
# the seat carries only osUsername + primaryUser and the link to the
# human.
user:
  plural: users
  display:
    icon: account_circle
    subtitle: name
  also: [actor]                # a user is an actor (alongside person, agent, organization)
  identity_any: [osUsername]   # one user per OS account on this machine
  fields:
    osUsername:        string    # OS account name ($USER)
    primaryUser:      boolean   # primary user on this machine (exactly one true)
  prior_art:
    - source: POSIX getpwuid (passwd database)
      url: https://pubs.opengroup.org/onlinepubs/9699919799/functions/getpwuid.html
      notes: >-
        The OS-level "user" — uid + login name + home dir. Our `osUsername`
        mirrors `pw_name`; identity-by-OS-account follows the same pattern.
        We diverge by separating the OS seat (`user`) from the human
        (`person`); POSIX conflates them.
    - source: schema.org/Audience
      url: https://schema.org/Audience
      notes: >-
        Loose fit. schema.org has no "OS user" concept — user accounts are
        product-specific. We model it explicitly because AgentOS is the
        product, and the seat is the machine's record of the human.
