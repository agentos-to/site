# A contextual unit conversion — one that is NOT intrinsic to the units
# and therefore cannot live on the `unit` node.
#
# Intrinsic conversions (ft→m, °C→K) depend only on the two units and are
# stored on unit.toBaseFactor / toBaseOffset. A `conversion` node exists
# only when the factor depends on something ELSE — an external, often
# time-varying parameter. Two cases:
#
#   molar-mass — mg/dL ↔ mmol/L needs the analyte's molar mass. The
#                factor is a property of the SUBSTANCE, not the unit
#                pair: glucose and cholesterol convert differently
#                between the same two units.
#   fx         — USD ↔ EUR needs a dated exchange rate. The rate is an
#                external fact that moves daily; `asOf` pins which day.
#
# This is the same lesson as health-reference-range: when a "property"
# actually depends on a third thing, model the third thing. The
# `parameter` edge points at it — a substance node, a rate-source node —
# with no shape constraint, because the two cases point at different
# kinds of node.
#
# `name` (inherited) is a human label, e.g. "USD→EUR 2026-05-15".
conversion:
  plural: conversions
  display:
    subtitle: kind
  fields:
    kind:     string    # molar-mass | fx
    factor:   number    # the multiplier — molar-mass case (derived from the molar mass)
    rate:     number    # the exchange rate — fx case
    asOf:     datetime  # when this rate/factor was valid (fx rates move daily)
  relations:
    from:     unit      # source unit
    to:       unit      # target unit
    # The external thing the conversion depends on. No shape constraint:
    # a substance node for the molar-mass case, a rate-source node for fx.
    parameter: node
  prior_art:
    - source: "NIH/NLM — UCUM conversion service"
      url: https://ucum.nlm.nih.gov/ucum-service.html
      notes: >-
        The NIH service requires a MOLWEIGHT parameter to convert between
        molar and mass concentration — direct proof that the conversion
        is not intrinsic to the unit pair but depends on the substance.
    - source: "QUDT — currency units carry no conversionMultiplier"
      url: https://qudt.org/doc/2024/12/DOC_VOCAB-UNITS-CURRENCY.html
      notes: >-
        QUDT explicitly notes that FX rates are external data not encoded
        in QUDT — the same reason fx conversions are their own node here
        rather than a property of the currency unit.
    - source: "ISO 4217 — Currency codes"
      url: https://www.iso.org/iso-4217-currency-codes.html
      notes: >-
        Currency identity for the from/to units of an fx conversion.
