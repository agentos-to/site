# A real human. People are actors — they can own accounts, hold roles,
# attend meetings, get involved in events. Resolved from contacts, message
# senders, meeting attendees, etc.
#
# Identity + intrinsic attributes live on the node. A person's name parts,
# gender, and birth/death dates are intrinsic temporal attributes of the
# one human (README rule 1's intrinsic-attribute case — like a measure's
# own timestamp), so they are plain fields here, not hoisted onto an event.
# What genuinely belongs to a *relationship between two parties* still
# rides the link:
#
#   joe —lived_at→ place {from, to}  # residences, time-bracketed via link_vals
#   joe —worked_at→ org {from, to}   # roles, same dated-link pattern
#   joe —born_to→ parent             # parentage (the edge, not the date)
#
# `current_residence` / `current_role` derive from the open (`to: null`)
# `lived_at` / `worked_at` link via the resolver — those stay relationships.
#
# Name model + cultural grounding (CJK family-first, Spanish two-surname,
# Icelandic patronymic, IATA PNR / ICAO 9303 legal-name verbatim) lives on
# the field comments below — vCard 4.0 N tuple + W3C i18n personal-names.
person:
  plural: people
  timed: self          # carries its own intrinsic valid-time — birthDate /
                       # deathDate are the person's own begin/end instant, not
                       # a date hoisted onto a relationship with another party
                       # (README rule 1). Same declaration `measure` uses for a
                       # reading's timestamp; generalizes from "self-occurrence"
                       # to "this node owns its dates". No birth event needed.
  identity_any: [url]  # canonical web identity — GitHub profile, personal
                       # site, vendor bio. Lets multi-source seeders dedupe
                       # without guessing on name collisions. (Superseded for
                       # identity-bearing imports by `identities` resolution —
                       # the engine matches on (platform, id); see below.)
  also: [actor]        # a person is also an actor
  fields:
    url:     string    # canonical web identifier (GitHub profile, personal
                       # site, vendor bio). schema.org/Person/url.
    notes:   text      # private bio text
    about:   text      # public bio text

    # — Name (vCard 4.0 N tuple + schema.org/Person; "given"/"family"
    #   avoid the Western first/last bias — CJK speaks family first) —
    givenName:           string
    additionalName:      string  # middle name(s) — vCard N additional
    familyName:          string
    honorificPrefix:     string  # "Dr", "Sir"
    honorificSuffix:     string  # "Jr", "III", "PhD" — matters for TSA Secure Flight
    legalName:           string  # verbatim as on government ID; IATA PNR / ICAO
                                 # 9303 MRZ need this exact form (structured
                                 # reconstruction is lossy: diacritics, hyphens)
    maidenName:          string  # cultural birth surname; distinct from familyName
                                 # in two-surname traditions (Spanish apellido materno)
    sortAs:              string  # vCard SORT-AS — particled surnames ("van der
                                 # Harten" sorts under H)
    nameOrder:           string  # rendering hint: given-family | family-given | patronymic
    phoneticGivenName:   string  # Apple/Google phonetic variant — TTS + call-screening
    phoneticFamilyName:  string
    nickname:            string  # casual / informal name in use
    gender:              string

    # — Intrinsic dates (the person's own begin/end instant) —
    birthDate:           datetime
    deathDate:           datetime

    identities: json   # the uniform identity set — one human, every way to
                       # reach or recognize them:
                       #   [{platform, id, handle?, instance?, account?}]
                       # `id` is the stable match key (DID / UUID / numeric id /
                       # actor URI / Google resourceName / vCard UID, or a
                       # normalized email / phone). `handle` is the mutable
                       # human-facing name (@user) — display + URL only, never
                       # matched alone (handles get recycled). `instance` scopes
                       # a federated handle (Mastodon homeserver, Matrix).
                       # `account` (address-book sources only) names which book.
                       # URL / icon / label / category all DERIVE from the
                       # `platform` node — never stored per entry. The connector emits each
                       # `id` already canonical (it knows what it's talking to);
                       # the engine resolves identity by matching these (phase 2).

  # Read-side derived bindings — only genuine relationships remain. `find:`
  # names the verb; `get:` projects the target's field; `where_link: {to: null}`
  # picks the open (current) interval per README rule 1's time-interval convention.
  derived:
    current_residence:  {find: lived_at, where_link: {to: null}, get: name}
    current_role:       {find: worked_at, where_link: {to: null}, get: title}

  display:
    icon: person
    image: image
    subtitle: about
    highlights: [birthDate, gender]
    body: notes

  groups:
    Name: [givenName, additionalName, familyName, nickname, legalName, maidenName]
    Personal: [birthDate, gender, current_residence, current_role]
    About: [about, notes, url]

  prior_art:
    - source: schema.org/Person
      url: https://schema.org/Person
      notes: >-
        givenName / familyName / additionalName / honorificPrefix /
        honorificSuffix / birthDate map 1:1 onto plain fields. schema.org
        keeps these flat on Person; so do we — they are intrinsic to the one
        human. We diverge by modeling `identities[]` as a first-class uniform
        set rather than scattered sameAs URLs.
    - source: vCard 4.0 (RFC 6350) §6.2.2 N property + §5.9 SORT-AS
      url: https://datatracker.ietf.org/doc/html/rfc6350#section-6.2.2
      notes: >-
        The N property is `family;given;additional;prefixes;suffixes`, each
        comma-multi-valued. Round-trips exactly through the structured name
        fields; SORT-AS → `sortAs`.
    - source: W3C i18n — Personal names around the world
      url: https://www.w3.org/International/questions/qa-personal-names
      notes: >-
        Canonical reference for why "first/last" is a Western bias. CJK names
        put family first; Spanish uses two surnames; Icelandic uses patronymics.
        `nameOrder` captures the rendering rule; structured fields stay neutral.
    - source: FOAF (Friend of a Friend)
      url: http://xmlns.com/foaf/spec/
      notes: >-
        Original social-graph vocabulary. Largely superseded by schema.org but
        still a reference for account-centric modeling.
