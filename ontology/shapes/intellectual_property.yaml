# A registered or pending intellectual-property right — a trademark,
# patent, registered design, or registered copyright. The unifying
# primitive for "an exclusive, jurisdiction-bound legal right in an
# intangible, held by an actor and granted by an IP office."
#
# One shape, not many — `category` discriminates (Wikidata models
# trademark / patent / design as siblings under `intellectual property
# right`; WIPO ST.96 splits the schema by Trademark / Patent / Design
# Components but the *right* is one concept).
#
# NOT a `creative_work`: a creative_work is the authored intangible
# itself (the book, the font, the logo-as-artwork). An
# intellectual_property node is the *legal right over* an intangible.
# A logo can be both — a creative_work node AND the subject of an
# intellectual_property node — wired by an edge, never by `also`.
#
# NOT a `qualification`: a qualification attests to a person's
# competency. An IP right attests to nothing and is held by an org as
# readily as a person. Sibling nouns, no `also` between them.
#
# Lifecycle (filed -> examined -> published -> allowed -> registered ->
# renewed) is N distinct-verb dated milestone edges to the granting
# office, NOT fields on the node (events-as-edges rule 1). The node
# carries only intrinsic, current-state facts. `status` is the current
# stage; the milestone edges carry the dated history.
#
# `name` (inherited) is the display label — "ADAVIA (trademark)".
intellectual_property:
  plural: intellectual_properties
  display:
    subtitle: category
  identity_any: [identifier]   # office serial / registration / patent
                                # numbers are unique within a register;
                                # jurisdiction-scoped identity (identity:
                                # [granted_by, identifier]) once a second
                                # register is imported — see research doc.
  fields:
    category:        string     # trademark | patent | design | copyright
    mark:            string     # the sign itself — wordmark text, or a
                                #   description of a logo/sound mark.
                                #   trademark-specific; null for patents.
    identifier:      string     # office serial OR registration number
    register:        string     # "Principal" | "Supplemental" (USPTO);
                                #   register/sub-register the right sits on
    status:          string     # pending | published | allowed |
                                #   registered | renewed | abandoned |
                                #   expired | cancelled | lapsed
    filingBasis:     string     # use | intent-to-use | foreign-priority
                                #   (Madrid). trademark-specific.
    niceClass:       integer[]  # Nice Classification class numbers
                                #   (1-45) for trademarks; IPC/CPC codes
                                #   would be a separate field if patents
                                #   are imported in anger.
    validIn:         string     # jurisdiction — "US", "EU", "WO" (Madrid)
    filedOn:         datetime   # application date (the priority anchor)
    registeredOn:    datetime   # null until registration issues
    expiresOn:       datetime   # current term end — null = pending.
                                #   Trademarks renew: expiresOn advances,
                                #   not a new node (cf. qualification).
    renewalPeriod:   string     # ISO-8601 duration — "P10Y" for a TM
    verificationUrl: url        # public registry link (USPTO TSDR etc.)
  relations:
    held_by:         actor         # owner — org or person (Wikidata P127)
    granted_by:      organization  # the IP office (USPTO, EUIPO, WIPO)
    covers:          creative_work # OPTIONAL — the artwork/logo/work the
                                   #   right protects, when it is itself a
                                   #   node. A wordmark covers nothing.
  prior_art:
    - source: Wikidata — trademark (Q167270) / registered trademark (Q111048186)
      url: https://www.wikidata.org/wiki/Q167270
      notes: >-
        Trademark is a subclass of `intellectual property right` and of
        `mark`; holder via `owned by` (P127). registered-vs-pending is a
        status of one type, not a separate type — our `status` field.
    - source: WIPO Standard ST.96 — Trademark Components
      url: https://www.wipo.int/standards/en/st96/v8-0/release_notes.html
      notes: >-
        Canonical IP-office XML model. Source for mark, identifier,
        register, niceClass, status. Splits schemas by Trademark /
        Patent / Design Components — confirms `category` as the
        discriminator across one `intellectual_property` concept.
    - source: WIPO Standard ST.87 — IP event codes
      url: https://www.wipo.int/standards/en/
      notes: >-
        Standard lifecycle-event vocabulary (KeyEventCode). The
        filed/published/granted/lapsed milestones are dated edges to the
        granting office, not node fields — events-as-edges rule 1.
    - source: Nice Classification (Nice Agreement 1957; NCL 13-2026)
      url: https://www.wipo.int/en/web/classification-nice
      notes: >-
        45-class system (1-34 goods, 35-45 services). `niceClass` is an
        integer[] of class numbers — a standard code. ADAVIA is Class 42.
    - source: USPTO — trademark process & intent-to-use basis
      url: https://www.uspto.gov/trademarks/basics/trademark-process
      notes: >-
        Lifecycle and the use-vs-intent-to-use fork. Source for the
        `status` value set and `filingBasis`.
    - source: schema.org/Intangible, schema.org/Brand
      url: https://schema.org/Intangible
      notes: >-
        Weak alignment — schema.org has no Trademark type; `Brand` is
        the marketing concept, not the legal right. Cited to mark the
        gap web ontologies leave: the IP right needs its own shape.
