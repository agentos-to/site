# A health condition — a diagnosis, problem, symptom, or family-history
# concern. "Asthma", "deviated septum", "seborrheic dermatitis", or a
# family risk like "aortic aneurysm in extended family".
#
# One shape covers both your own conditions and family history. The
# difference is never a field — it is which person the condition is wired
# to: `experienced_by -> person(you)` is a condition you have;
# `experienced_by -> person(your father)`, reachable via the family tree
# (`you -child_of-> father`), is a hereditary concern. FHIR splits these
# into Condition vs FamilyMemberHistory; we unify the noun and let the
# *edge* carry whose. "Proximity" (self / father / extended-family) is NOT
# stored — it is a read-time projection of the path from the viewer to the
# condition's subject, and is viewer-relative (your father's condition is
# 'father' to you, 'self' to him). The graph stores what happened; FHIR is
# a lens that reads it, never a schema the graph conforms to.
#
# `also: [note]` — a condition is a kind of note: private text content
# about your health, authored by you. It can reference other notes and
# carry free-form body content (history, mitigation plan).
#
# `bodySite` is a plain string. Anatomy is NOT modeled as its own shape —
# a personal health graph has too few distinct sites for an anatomy
# ontology to earn its keep. If that changes, a structured body-structure
# shape can be added as a purely additive migration.
#
# SNOMED CT is the universal clinical terminology — `snomedCode` is the
# join key (asthma = 195967001). ICD-10-CM is the billing/diagnosis code.
#
# `name` (inherited) is the condition name — "Asthma", "Deviated Septum".
health-condition:
  plural: health-conditions
  also: [event]                 # a condition has a lifespan — onset = startDate,
                                  # abatement = endDate. Rule 1: dates ride on the event.
  identity_any: [snomedCode, name]
  display:
    icon: sick
    subtitle: clinicalStatus
  fields:
    clinicalStatus:   string    # active | recurrence | relapse | inactive | remission | resolved
    verificationStatus: string  # confirmed | provisional | differential | refuted | unconfirmed
    bodySite:         string    # anatomical location, plain text — "nasal septum", "upper back"
    severity:         string    # mild | moderate | severe
    # Onset = startDate, abatement = endDate (inherited from event via also).
    # A more complex case (multiple diagnosis events, recurrences after
    # abatement) would model each as its own event node linked to this
    # condition node; for V1 the inherited startDate/endDate covers the
    # common case.
    snomedCode:       string    # SNOMED CT concept id for this condition
    icd10Code:        string    # ICD-10-CM code, when a billing/diagnosis code is on record
    clinicalArea:     string    # specialty field — "Cardiology", "Dermatology", "ENT"
    mitigation:       text      # monitoring or management plan ("ultrasound every few years")
  prior_art:
    - source: HL7 FHIR R5 — Condition
      url: https://www.hl7.org/fhir/condition.html
      notes: >-
        The resource for a problem/diagnosis. Our clinicalStatus,
        verificationStatus, severity, bodySite, onsetDate, abatementDate
        map directly. A condition experienced_by you is a plain FHIR
        Condition.
    - source: HL7 FHIR R5 — FamilyMemberHistory
      url: https://www.hl7.org/fhir/familymemberhistory.html
      notes: >-
        FHIR's separate resource for hereditary risk. We fold it into the
        same shape: a family-history entry is this node wired
        `experienced_by -> person(the relative)`, reachable via the family
        tree. FamilyMemberHistory.condition ≈ this node;
        FamilyMemberHistory.relationship ≈ the family-tree path, derived at
        read, never a stored field. Deliberate divergence from FHIR's
        two-resource split.
    - source: SNOMED CT
      url: https://www.snomed.org/
      notes: >-
        The universal clinical terminology. snomedCode is the canonical
        identity (asthma 195967001, eczema 43116000). FHIR Condition.code
        is SNOMED-coded; this is the join key to the wider clinical world.
    - source: ICD-10-CM
      url: https://www.cdc.gov/nchs/icd/icd-10-cm.htm
      notes: >-
        The diagnosis/billing code system. icd10Code captures the code
        when it appears on an insurance claim or discharge summary —
        complements (does not replace) SNOMED.
