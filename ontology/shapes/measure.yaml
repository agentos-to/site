# A single measured value about a subject, at a time — "LDL = 95 mg/dL on
# 2024-03-20", "PHQ-9 = 18 on 2026-06-01", a mood rating, a blood pressure.
# The measurement itself — not the definition (health-biomarker) and not the
# lab's catalog interval (health-reference-range). One shape fits a biomarker,
# a survey score, and a mood rating identically.
#
# `also: [event]` — a measurement happens at a moment (a sample is drawn, a
# survey is answered), so it is event-shaped: the *when* rides on the
# inherited startDate. A point measure (a lab draw) sets startDate only; a
# measure that spans time (continuous glucose over a night, a mood tracked
# across a week) uses startDate / endDate. Most measures are points.
#
# The value's UCUM unit rides on the val itself — every memex val stores a
# unit alongside it — so there is NO separate `unit` field. 95 mg/dL is not
# 95 mmol/L; the value is meaningless without its unit. Links to its
# definition via a `measures` link to a health-biomarker.
#
# Reference range — TWO complementary mechanisms, on purpose:
#   1. SNAPSHOT fields (refLow / refHigh / refText) — the interval THIS report
#      actually printed, frozen onto the measure. A historical fact: it never
#      changes, even if the lab later revises its range.
#   2. An optional `reportedRange` link to a health-reference-range node, when
#      that lab's interval is known as a first-class entity.
# The snapshot is the fact; the link is the enrichment. Both can coexist.
#
# `flag` (low / normal / high / critical) is DERIVED — a reader compares
# `value` against the range. Stored as an optional convenience only; never the
# source of truth. Re-derive it; don't trust a frozen copy. ("Derive don't
# declare.")
measure:
  plural: measures
  also: [event]                 # a measurement happens at a moment; the when
                                # rides on the inherited startDate (rule 1).
  display:
    icon: vital_signs
    subtitle: startDate
  fields:
    value:            number    # the measured quantity — 95, 1.24, 18; its UCUM unit rides on the val
    valueText:        string    # for non-numeric results — "Negative", "Reactive", "Trace"
    refLow:           number    # SNAPSHOT: reference low as printed on THIS report (unit on the val)
    refHigh:          number    # SNAPSHOT: reference high as printed on THIS report (unit on the val)
    refText:          string    # SNAPSHOT: verbatim range string from this specific report
    flag:             string    # DERIVED — low | normal | high | critical. Convenience only.
    status:           string    # FHIR status — final, preliminary, amended, corrected
    notes:            text      # annotations on this specific measurement
  prior_art:
    - source: HL7 FHIR R5 — Observation
      url: https://www.hl7.org/fhir/observation.html
      notes: >-
        The canonical resource for a measured value. value (with its UCUM unit)
        ≈ valueQuantity; startDate ≈ effectiveDateTime; refLow/refHigh/refText ≈
        the referenceRange backbone (the inline snapshot); flag ≈
        interpretation; status ≈ status. `measures` ≈ code resolved to a
        biomarker. FHIR has no normalized-range link — our `reportedRange` link
        adds that.
    - source: HL7 v2.x — OBX segment
      url: https://hl7-definition.caristix.com/v2/HL7v2.5/Segments/OBX
      notes: >-
        The legacy lab-result segment most labs still emit. OBX-5 (value) and
        OBX-6 (units) together ≈ our value-with-unit; OBX-7 (reference range),
        OBX-8 (abnormal flag), OBX-14 (datetime) map to refText/flag/startDate.
    - source: UCUM — Unified Code for Units of Measure
      url: https://ucum.org/
      notes: >-
        The unit on every numeric val (mg/dL, mmol/L, 10*3/uL) follows UCUM —
        the unit system FHIR mandates for Observation.valueQuantity, so
        measures round-trip into FHIR cleanly.
