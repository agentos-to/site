# A message thread — an iMessage chat, WhatsApp group, email thread, Claude
# transcript, etc. Contains messages and links to participants.
conversation:
  plural: conversations
  identity: [at, id]
  display:
    icon: forum
    subtitle: text
    preview:
      content: full        # summarize_conversation renders the relationship arc into `content` — never clip it.
  fields:
    isGroup:          boolean
    isArchived:       boolean
    unreadCount:      integer
    messageCount:     integer   # number of messages in the thread
    accountEmail:     string    # which account this conversation belongs to
    historyId:        string    # Gmail History ID for sync cursor (per-thread high-water mark)
    source:            string    # transcript provenance (e.g., granola's "manual" vs "recording")
    cwd:               string    # working directory (for dev-tool transcripts)
    gitBranch:        string    # git branch at the time of the conversation
    # Agent-run telemetry — the engine's own agent-loop stamps these; a person's
    # chat transcript leaves them empty. Spend rides here so Activity groups cost
    # by model/account/day off the graph.
    model:            string    # the model the provider RESOLVED to — the pricing key
    inputTokens:      integer
    outputTokens:     integer
    reasoningTokens:  integer   # thinking tokens — a subset of output, broken out for the record
    costUsd:          number    # USD, provider-reported or graph-computed (see costSource)
    costSource:                  # closed set; the engine rejects any other value
      type: string
      enum: [reported, computed, unpriced]
      description: where costUsd came from — provider-reported, graph-computed from list price, or unknown
    iterations:       integer   # agent-loop turns taken
    status:                      # terminal state of an agent run
      type: string
      enum: [done, error, timeout]
      description: how an agent run ended — completed, errored, or hit its iteration cap
  prior_art:
    - source: ActivityStreams 2.0 context/inReplyTo
      url: https://www.w3.org/TR/activitystreams-vocabulary/#dfn-context
      notes: >-
        Conversations are AS2 contexts — the thread that groups replies. Our
        participant[] ≈ to/cc/audience.
    - source: Matrix Room (m.room)
      url: https://spec.matrix.org/latest/client-server-api/#room-events
      notes: >-
        Practical thread model. Our isGroup ≈ room.join_rules; unreadCount ≈
        unread_notifications.highlight_count.
    - source: Gmail API — Thread resource
      url: https://developers.google.com/gmail/api/reference/rest/v1/users.threads
      notes: >-
        Our messageCount ≈ messages.length; unreadCount derived from UNREAD
        labels on Thread messages.
