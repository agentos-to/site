# A mouse-pointer image — the arrow, the I-beam, the hand, the resize
# cursors. The pointer scheme a theme bundles, one entry per role.
#
# A cursor is BOTH a creative_work (the pointer art — its designer,
# license, era come from there) AND a file (the bytes on disk, with a
# format and pixel dimension). Distinct from `icon`: an icon labels a
# thing in the UI; a cursor IS the pointer the OS paints under the mouse.
#
# Browser-supported formats only — `png` (with an explicit hotspot, since
# PNG carries none) and `cur` (embeds its own). Animated `.ani` cursors
# are NOT supported in CSS `cursor` and never become cursor assets.
cursor:
  plural: cursors
  display:
    subtitle: purpose
  # `url` is the canonical cursor-file location (Vite-hashed asset path or
  # external URL). Each file is one entry; themes bundling the same image
  # share one node via this dedup key.
  identity_any: [sha, url]
  also: [creative_work, file]   # a cursor is a creative work AND a file
  fields:
    hotspotX:          integer   # the active pixel, X (image coords)
    hotspotY:          integer   # the active pixel, Y (image coords)
    dimension:         integer   # rendered pixel size (square assumed)
    format:            string    # 'png' | 'cur' | 'svg'
    purpose:           string    # 'default' | 'pointer' | 'link' | 'text' |
                                 # 'help' | 'wait' | 'not-allowed' | 'move' |
                                 # 'ns-resize' | 'ew-resize' | 'nesw-resize' |
                                 # 'nwse-resize' | 'col-resize' — the slot /
                                 # CSS keyword the cursor is intended for.
  prior_art:
    - source: CSS UI `cursor` property
      url: https://www.w3.org/TR/css-ui-4/#cursor
      notes: >-
        The render contract: `cursor: url(<url>) <hotspotX> <hotspotY>,
        <keyword>`. Our hotspotX/hotspotY ARE the `<x> <y>` the spec needs
        for image cursors; purpose maps to the trailing keyword.
    - source: Windows .cur / .ani cursor format
      url: https://learn.microsoft.com/en-us/windows/win32/menurc/about-cursors
      notes: >-
        Source format of the bundled XP scheme — the .cur header carries
        the hotspot in its image-directory entry (bytes 4–7), which we read
        and record as hotspotX/hotspotY when downscaling to PNG. `.ani`
        (animated) is excluded — browsers don't support it in CSS cursor.
    - source: schema.org/ImageObject
      url: https://schema.org/ImageObject
      notes: >-
        A cursor is an image artifact; most metadata (author, license,
        datePublished) comes from creative_work via `also`, dimension ≈
        width/height.
