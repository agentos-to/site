# A lab-specific reference interval — the "normal range" for a biomarker,
# as established by ONE laboratory using ONE method for ONE population.
#
# This shape exists because a reference range is NOT a property of the
# analyte. The same biomarker has different ranges depending on the lab,
# the instrument/assay, the reference population, and when the interval
# was established. Real evidence: Singapore labs report tighter intervals
# than US labs for the same analyte; two clinics in the same US city give
# different ranges for the same test. Both are expected — CLSI EP28-A3c
# makes every lab establish or verify its own intervals.
#
# No mainstream clinical data model represents the reference range as a
# first-class entity — FHIR inlines it on Observation.referenceRange,
# OMOP inlines range_low/range_high columns, openEHR inlines it on the
# data value. This shape fills that gap. FHIR's ObservationDefinition.
# qualifiedInterval is the closest precedent and is the EXPORT projection
# of this shape — store rich here, collapse lossy to FHIR for interchange.
#
# Identity is the natural key from clinical reality: which analyte, which
# lab, which method, which population, valid from when. Geography is NOT
# a key field — it only matters insofar as it changed the lab's reference
# population, which `issuingLab` + the population fields already capture.
#
# `validFrom`/`validTo` is the field every standard omits and is the
# whole point: a result from 2014 must be interpreted against the
# interval that lab considered valid in 2014, not today's.
#
# `name` (inherited) is a human label, e.g. "Quest LDL reference (adult male)".
health-reference-range:
  plural: health-reference-ranges
  also: [event]                                          # a range IS an event-shaped fact —
                                                          # it took effect at a moment, was
                                                          # superseded at another. startDate /
                                                          # endDate ride from event per rule 1.
  identity: [analyte, issuingLab, method, startDate]    # compound — the natural key.
                                                          # `startDate` is inherited from event
                                                          # (was `validFrom` before the rule-1
                                                          # migration). Population fields
                                                          # disambiguate further within a
                                                          # lab+method.
  display:
    subtitle: refText
  fields:
    low:              number    # low bound of the interval
    high:             number    # high bound of the interval
    unit:             string    # UCUM unit the bounds are expressed in
    refText:          string    # verbatim interval string as the lab prints it ("0.4 - 4.5")
    category:         string    # reference | critical | absolute  (from FHIR qualifiedInterval)
    provenance:       string    # established | verified | manufacturer-claimed  (per CLSI EP28-A3c)
    method:           string    # assay + instrument — the real driver of bias
                                  # ("calculated from total T + SHBG", "direct immunoassay")
                                  # When this interval became standard (formerly `validFrom`)
                                  # and when it was superseded (formerly `validTo`) live on
                                  # event.startDate / endDate (inherited).
    # Population filter — who this interval applies to. A range is only
    # valid for a partition of the population; these fields define it.
    ageLow:           number    # minimum age this interval applies to (years)
    ageHigh:          number    # maximum age
    sex:              string    # male | female | any
    pregnancy:        string    # not-pregnant | pregnant | any; trimester if relevant
    gestationalAge:   string    # gestational age range, for pregnancy-specific intervals
    fasting:          boolean    # whether the interval assumes a fasting sample
    timeOfDay:        string    # for diurnal analytes (cortisol) — "morning", "midnight"
  links:
    measures:          health-biomarker   # the biomarker this interval is for
    issued_by:       health-lab         # the lab that established or verified this interval
  prior_art:
    - source: CLSI EP28-A3c — Defining, Establishing, and Verifying Reference Intervals
      url: https://clsi.org/shop/standards/ep28/
      notes: >-
        The authoritative protocol. Each lab must establish (de novo,
        min n=120 per partition) or verify (min n=20) its own intervals.
        `provenance` (established/verified/manufacturer-claimed) comes
        directly from this guideline; it is why two same-instrument labs
        legitimately diverge.
    - source: HL7 FHIR R5 — ObservationDefinition.qualifiedInterval
      url: https://www.hl7.org/fhir/observationdefinition.html
      notes: >-
        The closest standard precedent — a reusable, multi-context
        interval. Our category maps to its rangeCategory; range to range;
        age/gestationalAge/sex to the same; condition ≈ our population
        fields. But qualifiedInterval has NO issuingLab and NO validity
        window — this shape adds both. qualifiedInterval is the lossy
        EXPORT projection of this shape, not its equal.
    - source: HL7 FHIR R5 — Observation.referenceRange
      url: https://www.hl7.org/fhir/observation.html
      notes: >-
        FHIR's other reference-range model — inlined on the result as a
        denormalized snapshot (low/high/normalValue/type/appliesTo/age/
        text). health-observation keeps that snapshot too (its refLow/
        refHigh fields); this shape is the normalized, reusable form the
        snapshot can point back to.
    - source: OMOP CDM v5.4 — MEASUREMENT.range_low / range_high
      url: https://ohdsi.github.io/CommonDataModel/cdm54.html
      notes: >-
        OMOP inlines range_low/range_high as columns on the measurement
        row — "no separate standalone table for reference ranges."
        Confirms the gap: no major model makes the range first-class.
