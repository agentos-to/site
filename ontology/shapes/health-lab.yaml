# A clinical laboratory or testing facility — the place that processes a
# blood draw, runs an assay, and issues results. Quest Diagnostics,
# LabCorp, a hospital lab, a Singapore screening clinic, a travel-health
# center.
#
# `also: [organization]` — a lab IS an organization (which is in turn an
# actor). Same pattern as `airline`: an airline is also an organization,
# adding only airline-specific fields. health-lab adds only the fields
# that matter for a testing facility, and inherits name / industry /
# headquarters / website from organization.
#
# A lab matters in this graph because it is the issuer of reference
# ranges (health-reference-range.issuingLab) and the performer of panels
# (health-panel.performedAt). Two labs running the same test can report
# different reference intervals — the lab is the identity that explains
# that divergence.
#
# `name` (inherited from organization→actor) is the lab name —
# "Quest Diagnostics", "Fullerton Health".
health-lab:
  plural: health-labs
  also: [organization]
  identity_any: [cliaNumber, url]   # CLIA number is a unique US lab identifier;
                                     # url (inherited from organization) for non-US labs.
  display:
    subtitle: labType
  fields:
    cliaNumber:       string    # CLIA certification number — unique US clinical-lab id
    npi:              string    # NPI — CMS National Provider Identifier (organizational, type-2)
    ccn:              string    # CCN — CMS Certification Number (Medicare-enrolled facility id)
    labType:          string    # reference-lab | hospital-lab | clinic | point-of-care | screening-center
    accreditation:    string    # accrediting body — "CAP", "ISO 15189", "JCI"
    # The parent network (Quest, LabCorp, a hospital group) is the
    # `parentOrganization` link inherited from organization — not a field.
  prior_art:
    - source: schema.org/MedicalOrganization / DiagnosticLab
      url: https://schema.org/DiagnosticLab
      notes: >-
        schema.org's DiagnosticLab is a MedicalOrganization subtype, which
        is an Organization subtype — exactly our also:[organization] chain.
        Our labType refines what schema.org leaves implicit.
    - source: CLIA — Clinical Laboratory Improvement Amendments
      url: https://www.cms.gov/medicare/quality/clinical-laboratory-improvement-amendments
      notes: >-
        cliaNumber, npi (the organizational/type-2 National Provider
        Identifier), and ccn (the Medicare CMS Certification Number) are all
        CMS-issued identifiers a US testing facility carries. cliaNumber is
        the canonical identity for a US clinical lab.
    - source: "HL7 FHIR R5 — Organization (role: laboratory)"
      url: https://www.hl7.org/fhir/organization.html
      notes: >-
        FHIR models a lab as an Organization with a laboratory role code,
        not a distinct resource — consistent with our also:[organization].
        FHIR Observation.performer / DiagnosticReport.performer reference
        it; our health-panel.performedAt and health-reference-range.
        issuingLab links are the same linkage.
