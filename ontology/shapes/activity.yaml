# An immutable change event — a graph mutation, app run, search, or load.
# Fields for what happened, relations for who/what/where.
activity:
  plural: activities
  also: [event]                   # an activity IS an event — a system mutation at a moment
  display:
    subtitle: action
  icon: activity
  fields:
    action:           string      # create, update, delete, run, read, search, load
                                    # When the activity happened lives on event.startDate
                                    # (inherited via `also: [event]`), per rule 1.
    changedKeys:      string[]    # which fields changed (for updates)
    toolName:         string      # for app runs: which operation
    duration:         number      # for app runs: execution time in ms
    success:          boolean     # for app runs: did it succeed
  links:
    # target is any graph node — no shape constraint. Stored as target_id field
    # until the activity ontology spec redesigns this as a proper typed relation.
    in:          mcp_session # during which MCP session
    filed_in:           list        # working directory — a list node with listType: 'folder'
  prior_art:
    - source: ActivityStreams 2.0
      url: https://www.w3.org/TR/activitystreams-core/
      notes: >-
        AS2's Create/Update/Delete activities match our action values. We
        diverge by tracking changedKeys explicitly instead of encoding full
        object replacement.
    - source: OpenTelemetry Traces
      url: https://opentelemetry.io/docs/concepts/signals/traces/
      notes: >-
        Closest fit for toolName/duration/success — span-shaped. Our activity
        is closer to a span event than a full span.
