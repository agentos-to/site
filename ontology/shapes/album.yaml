# A curated collection of images produced by the engine or a skill.
# The engine seeds system albums (e.g. "Wallpapers") at boot; skills
# may produce additional albums for photo libraries, screenshots, etc.
#
# Albums group images; the `image --add_to--> album` edge is the reverse
# of a user-facing "add to album" action. Membership is immutable once
# the link is made (delete the edge to remove an image).
album:
  plural: albums
  identity: [id]
  subtitle: id
  icon: images
  fields:
    id:                string    # slug — e.g. "wallpapers", "screenshots"
  relations:
    contains:          image[]   # reverse of image.add_to — authoring view
  prior_art:
    - source: Apple Photos Album / IPTC PhotoMetadata
      url: https://www.iptc.org/std/photometadata/specification/IPTC-PhotoMetadata
      notes: >-
        Albums are the simplest photo-grouping primitive. No EXIF, no date
        range — just a named bucket. IPTC's "Album" PMV is the de-facto
        interchange format for this.
