# An identity claim — "the engine-level user X identifies as person:Y
# in volume Z". Phase 5 of the volumes spec; lets one OS user map onto
# multiple persona-nodes across multiple mounted volumes.
#
# `user_id` is foreign to `engine.db::users` — the engine's user
# table — not to a graph node. A user_identity row is the bridge.
#
# Many mappings per user are normal:
#   user joe → person:joe in users/joe.db                 (active=true)
#   user joe → person:harry_potter in pods/hp.db          (active=false; role-play)
#   user joe → person:joe_health_subject in pods/health.db (active=true; explicit subject)
#
# The `active` flag picks the "default" person inside each volume when
# the user has multiple mappings into the same one.
user_identity:
  plural: user_identities
  display:
    subtitle: volume_id
    highlights:
      - person_node_id
      - active
  icon: user
  fields:
    user_id:        string   # engine.db user id (v1 single-user → "joe")
    volume_id:      string   # the volume the persona lives in
    person_node_id: string   # the person/actor node id inside that volume
    active:         boolean  # is this the default persona for the user in that volume
  prior_art:
    - source: Solid (Tim Berners-Lee)
      url: https://solidproject.org/faq
      notes: >-
        Solid Pod ↔ WebID is the per-user identity model. A Solid user
        owns one personal pod whose WebID is the authoritative identity;
        cross-pod identity is a single relation. We split: User is engine
        state; Person is graph content; user_identity is the explicit
        bridge that can be many-to-many across volumes.
    - source: Unix/macOS — /etc/passwd vs /Users/<u>
      url: https://en.wikipedia.org/wiki/Passwd
      notes: >-
        OS users (engine.db::users) and home directories
        (~/.agentos/users/<u>.db) follow the Unix convention. The
        identity *within* the home is content the home owns.
