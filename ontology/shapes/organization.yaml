# A company, nonprofit, or other organization. Organizations are actors — they
# can be attributed as "who" in the graph alongside people and agents.
organization:
  plural: organizations
  identity: url
  display:
    subtitle: industry
  also: [actor]       # an organization is also an actor
  fields:
    industry:          string
    founded:           datetime
  relations:
    member:            person[]
    domain:            domain
    website:           website
    headquarters:      place
    parentOrganization: organization  # the org this one is a part of /
                                       # subsidiary of (a hospital network, a
                                       # parent company). subOrganization is
                                       # the reverse — reach it by traversal.
  prior_art:
    - source: schema.org/Organization
      url: https://schema.org/Organization
      notes: >-
        Our industry ≈ naics/isicV4 (loosely); founded = foundingDate; member[]
        = member; headquarters = location; parentOrganization maps directly
        (schema.org's subOrganization is its declared inverse).
    - source: vCard 4.0 KIND=org (RFC 6350)
      url: https://datatracker.ietf.org/doc/html/rfc6350
      notes: >-
        Organization-as-contact. Our website/domain ≈ URL; headquarters ≈ ADR.
        Thinner than schema.org for industry/founded.
    - source: Wikidata (Organization, Q43229)
      url: https://www.wikidata.org/wiki/Q43229
      notes: >-
        Cross-reference identity. Useful for deduping; no direct field
        alignment but industry maps to P452 (industry) and founded to P571
        (inception).
