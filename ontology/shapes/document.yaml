# A document — any human-readable text content with structure and authorship.
# Base type for reports, manuscripts, briefs, whitepapers, analyses.
# article, note, and webpage are siblings (not children) for now; they may
# gain also: [document] in a future migration once the shape stabilizes.
document:
  plural: documents
  display:
    icon: description
    subtitle: contentType
    highlights: [datePublished, author, wordCount]
    body: abstract
  also: [file]
  fields:
    contentType:      string    # markdown, html, pdf, plaintext, rst
    language:          string    # ISO 639-1 (e.g. en, es, ja)
    wordCount:        integer
    abstract:          text      # short summary of the document's contents
    tableOfContents: text      # section headings, one per line
  prior_art:
    - source: Dublin Core Metadata Initiative
      url: https://www.dublincore.org/specifications/dublin-core/dces/
      notes: >-
        Our contentType ≈ dc:format; language = dc:language; author =
        dc:creator; references/citedBy ≈ dc:relation.
    - source: schema.org/DigitalDocument
      url: https://schema.org/DigitalDocument
      notes: >-
        Our abstract ≈ abstract; tableOfContents = hasPart or
        accessModeSufficient; wordCount = wordCount.
    - source: W3C Web Annotation Data Model
      url: https://www.w3.org/TR/annotation-model/
      notes: >-
        Our references[]/citedBy[] are annotation target/body relationships
        between documents.
