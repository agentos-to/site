# A manufactured electronic product — the model as a thing in the world:
# "Roku Ultra 4800X", "Brother HL-L3270CDW", "Dreame P2009". Intrinsic facts
# only (manufacturer, model, form factor). A specific powered-on instance with
# an IP and a MAC is a `device`, not hardware. Fills the "hardware" subtype
# product.yaml already names but never defined.
hardware:
  plural: hardware
  identity_any: [url, modelNumber]
  display:
    icon: memory
    iconFrom: formFactor       # the per-record face: formFactor's value IS the icon slot (router/tv/printer/…), resolved engine-side. device inherits this via `also`.
    subtitle: modelNumber
  also: [product]            # hardware is also a product
  fields:
    manufacturer:    string    # device-maker brand ("Tesla", "Brother") — the brand that makes the model, distinct from the OUI silicon vendor; the graph-native form is a `manufactured_by` edge to an `organization`
    model:            string    # model name ("Roku Ultra", "HL-L3270CDW")
    modelNumber:     string    # manufacturer part/model number ("4800X", "P2009")
    # Closed vocabulary — each value is also an icon slot (display.iconFrom
    # resolves the per-record face engine-side; a pack overrides `icon.<value>`).
    formFactor:
      type: string
      enum: [router, printer, tv, speaker, console, vacuum, camera, bulb, sensor, computer, phone, car, hub, iot]
      description: physical kind of the device — drives its face
  prior_art:
    - source: schema.org/ProductModel vs IndividualProduct
      url: https://schema.org/ProductModel
      notes: >-
        schema.org separates ProductModel (the model) from IndividualProduct (a
        specific unit). Our hardware = ProductModel; our device =
        IndividualProduct. formFactor ≈ category / additionalType.
