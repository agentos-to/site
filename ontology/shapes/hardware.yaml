# A physical hardware product — computer, phone, appliance, component.
#
# Examples: MacBook Pro, iPhone, Arduino, server rack
hardware:
  plural: hardware
  identity: serialNumber
  subtitle: author
  also: [product]     # hardware is also a product
  fields:
    modelNumber:      string
    serialNumber:     string
    specs:             json      # technical specifications
  relations:
    manufacturer:      organization
  prior_art:
    - source: schema.org/Product (IndividualProduct subtype)
      url: https://schema.org/IndividualProduct
      notes: >-
        Our serialNumber = serialNumber; modelNumber ≈ model; specs ≈
        additionalProperty (PropertyValue list).
    - source: GS1 Global Trade Item Number (GTIN)
      url: https://www.gs1.org/standards/id-keys/gtin
      notes: >-
        Hardware bar-codes are GTIN-12/13/14 — we reuse the product shape's
        barcode alignment.
