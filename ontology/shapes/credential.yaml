# A credential held by AgentOS — the graph descriptor that mirrors one
# encrypted row in the vault (~/.agentos/data/agentos.db, credentials table).
#
# Every vault row also exists as a node of this shape. The *value* stays
# encrypted in the credentials table, addressed by `storeRowId`. This
# node carries only metadata — domain, identifier, itemType, timestamps,
# provenance edges — and nothing secret. Descriptor reads are cheap
# (graph traversal), decryption is on demand (SDK's `auth_store.read`
# by identifier, after the vault system skill returns the descriptor).
#
# Identity is `(domain, identifier, itemType)` — one node per
# distinct credential, matching the unique-row constraint on the
# credentials SQLite table (minus `source`, which is provenance, not
# identity: two providers writing the same domain/identifier/itemType
# pair describe the same credential; whichever writes last wins).
credential:
  plural: credentials
  identity: [domain, identifier, itemType]
  subtitle: source
  fields:
    domain:            string     # registrable form, e.g. "approach.app"
    identifier:        string     # canonical identifier, e.g. "abp@contini.co"
    itemType:          string     # "login_credentials" | "cookie" | "oauth" | "api_key"
    source:            string     # skill id that last wrote this row ("onepassword", "brave-browser", "austin-boulder-project")
    obtainedAt:        datetime
    lastVerified:      datetime
    expiresAt:         datetime
    refreshable:       boolean
    storeRowId:        integer    # bridge to the encrypted credentials.id
  relations:
    at:                organization  # the service this credential unlocks.
                                      # Credential is *for* the service; the
                                      # skill that wrote it is surfaced via
                                      # `writtenBy`.
    account:           account       # the account this credential unlocks.
                                      # Populated from (domain, identifier).
    writtenBy:         skill         # which skill wrote the row (provenance).
                                      # Tracks `source` as a traversable edge.
  prior_art:
    - source: OAuth 2.0 Token Introspection (RFC 7662)
      url: https://datatracker.ietf.org/doc/html/rfc7662
      notes: >-
        RFC 7662 describes token metadata as a separate addressable
        resource from the token itself (active, exp, iss, sub, scope).
        Same split here: descriptor is queryable graph metadata,
        encrypted value is retrieved by a separate call (`auth_store.read`
        by identifier). Our obtainedAt/expiresAt/lastVerified mirror
        iat/exp/auth_time.
    - source: FIDO Metadata Service (MDS3)
      url: https://fidoalliance.org/metadata/
      notes: >-
        FIDO separates authenticator metadata from the authenticator
        itself — metadata is queryable, the cryptographic material is
        not. Mirrors our descriptor/vault split.
    - source: macOS Keychain SecItem attributes
      url: https://developer.apple.com/documentation/security/keychain_services/keychain_items/item_attribute_keys_and_values
      notes: >-
        Keychain separates `kSecAttr*` (metadata — server, account,
        creation/modification dates) from `kSecValueData` (the secret).
        Attributes are queryable without decrypting the value. Our
        fields map: kSecAttrServer → domain, kSecAttrAccount →
        identifier, kSecAttrCreationDate → obtainedAt,
        kSecAttrModificationDate → lastVerified.
    - source: schema.org/DigitalDocument (WebAuthn credentials stored as)
      url: https://schema.org/DigitalDocument
      notes: >-
        Weak alignment — schema.org has no native credential type.
        Cited only to note that existing web ontologies deliberately
        stop short of secret material; descriptor-only is the
        established pattern.
