# A process / swim-lane — actors across ordered steps. The universal shape
# for any multi-actor procedure: a business process, a user journey, an
# onboarding, a recipe, a build pipeline. Steps are their own `step` nodes
# (ordering needs an explicit position — schema.org/HowToStep warns markup
# order is insufficient; BPMN orders via sequence flow).
flow:
  plural: flows
  display:
    subtitle: goal
    highlights: [trigger, status]
  icon: workflow
  fields:
    goal:     text      # the end-state the process produces
    trigger:  string    # what starts the flow (BPMN start event)
    status:   string    # draft | active | deprecated
  links:
    involves:  node[]    # the participants / swim-lanes (personas, people, orgs), in column order (order on the link)
    has_step:  step[]    # the ordered steps (order lives on step.position)
    serves:    node[]    # who the flow is for — a persona, person, or organization
    produces:  node      # the resulting artifact / outcome
  prior_art:
    - source: BPMN 2.0 (OMG)
      url: https://www.omg.org/spec/BPMN/2.0/
      notes: >-
        Pools/lanes = actors; SequenceFlow imposes step order; the lane a
        step sits in assigns its actor.
    - source: schema.org/HowTo
      url: https://schema.org/HowTo
      notes: >-
        HowTo = a flow; its steps are HowToStep items; HowTo.result ≈ goal.
    - source: UML Activity Diagram (activity partitions)
      url: https://www.uml-diagrams.org/activity-diagrams.html
      notes: >-
        Activity partitions are the formal name for swim-lanes; actions are
        ordered by control flow.
