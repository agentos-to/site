# An AgentOS settings node — the user's portable configuration store,
# the graph analog of macOS `~/Library/Application Support`. Settings
# live in the **home vault** (the human's own content, agent-writable)
# and travel with the vault to any AgentOS install, so a user who moves
# to another machine carries their look, their behavior, and every app's
# config with them. This is the seam that keeps the System volume free of
# agent-writable content: the machine's login record (`user`/seat) is
# OS plumbing on System, read-only; everything the *user* configures
# lands here in home.
#
# Two roles, one shape — distinguished by which relation it carries:
#   - **OS settings** (one per person) — `pref:ui` (render) and
#     `pref:system` (engine behavior); `--belongs_to--> person`.
#   - **per-app settings** (lazy, one per configured app) — `pref:app`
#     config blob; `--configures--> app` (cross-volume into System).
#     Born the first time an app writes config, never up front — fewer
#     parts until an app actually needs a home for its state.
#
# The value is carried in `pref:<namespace>` JSON vals (like every other
# cascade carrier), not in declared fields — so the shape stays a thin
# carrier whose substance is its `prefsSchemas` vocabulary and its two
# relations. `name` is the only intrinsic field (a human label:
# "Settings", or "Gmail settings").
#
# `prefsSchemas` (top-level metadata, not a per-instance field) declares
# the universal pref vocabulary for AgentOS. The engine seeds it onto the
# SETTINGS shape-def node at boot; SettingsPanel reads it off the def,
# walks the entries, and writes resolved values back to the active
# settings instance under `pref:<namespace>`. The cascade does the rest.
settings:
  plural: settings
  display:
    icon: tune
    subtitle: name
  fields:
    name:             string    # human label — "Settings", "Gmail settings"
  prefsSchemas:
    ui:
      # User-level identity defaults (override at instance level for
      # per-view skinning, e.g. a fixed theme for one folder window).
      - key: themeId
        kind: select
        label: Theme
        description: Desktop theme — window chrome, fonts, sounds.
        group: Theme
        optionsShape: theme
        # Theme nodes are OS-owned — projected into the engine-owned `system`
        # volume (rebuilt from the installed theme folders each boot), not
        # authored in home. The picker reads its options from there; the
        # user's pick still writes to the home settings node.
        optionsVolume: system
        optionsValue: themeId
        optionsLabel: name
        # The floor ("no theme") is the permanent default — a real, always
        # present choice. Surface it as a prepended empty-value option so the
        # user can always switch back to the base look, even with zero packs
        # installed.
        optionsNone: Base
      # Fonts tab — typography. Its own tab (sibling to Icons / Sounds /
      # Background) so the Appearance tab stays a clean theme + look-knob
      # + preview surface. The `Fonts` group also picks up the
      # FontSlotPickers suffix (font.system / font.mono) wired via
      # groupSuffixes in Settings.tsx.
      - key: fontSize
        kind: number
        label: Font Size
        description: Base UI font size in pixels.
        group: Fonts
        tab: Fonts
        min: 8
        max: 20
        step: 1
        default: 12
      # Background tab — owns the desktop background composition for
      # the active view (per-desktop overrides via the V6 cascade). The
      # wallpaper IMAGE flows through the slot system
      # (`pref:ui.slot.image.wallpaper` → asset id); the `Background`
      # group renderer (BackgroundPanel — universal, theme-paintable)
      # wires the picker via the slot helpers on GroupRenderProps. Only
      # the surrounding color + position knobs live in the schema here.
      - key: background.color
        kind: color
        label: Background Color
        description: Solid background tone for this view.
        group: Background
        tab: Background
        default: '#3A6EA5'
      - key: background.position
        kind: select
        label: Position
        description: How the wallpaper fills the surface.
        group: Background
        tab: Background
        default: fill
        options:
          - { value: fill, label: Fill }
          - { value: fit, label: Fit }
          - { value: stretch, label: Stretch }
          - { value: center, label: Center }
          - { value: tile, label: Tile }
      # Icons tab — desktop icon layout knobs. User-wide defaults,
      # written to settings.pref:ui. Per-folder overrides happen through
      # that folder's own View menu (the cascade reads them at the
      # instance layer); Settings shows the user-default level only.
      # The Icons group on this tab also picks up the IconSlotPickers
      # suffix (back / forward / my-computer / control-panel /
      # folder-closed) wired via groupSuffixes in Settings.tsx.
      - key: icons.iconSize
        kind: number
        label: Icon Size
        description: Icon side length in pixels.
        group: Icons
        tab: Icons
        min: 24
        max: 96
        step: 4
        default: 32
      - key: icons.iconSpacing
        kind: number
        label: Icon Spacing
        description: Pixels between icon cells.
        group: Icons
        tab: Icons
        min: 4
        max: 48
        step: 2
        default: 8
      - key: icons.showIcons
        kind: boolean
        label: Show Icons
        description: Render icons on this view.
        group: Icons
        tab: Icons
        default: true
      - key: icons.startingCorner
        kind: select
        label: Starting Corner
        description: Where the first icon lands.
        group: Icons
        tab: Icons
        default: top-left
        options:
          - { value: top-left, label: Top Left }
          - { value: top-right, label: Top Right }
          - { value: bottom-left, label: Bottom Left }
          - { value: bottom-right, label: Bottom Right }
      - key: icons.flowDirection
        kind: select
        label: Flow Direction
        description: Whether icons fill columns or rows first.
        group: Icons
        tab: Icons
        default: vertical-first
        options:
          - { value: vertical-first, label: Vertical First }
          - { value: horizontal-first, label: Horizontal First }
    system:
      # Where apps / windows.open land by default. Menubar toggle and
      # Settings share this one pref — standalone (native Tauri / shim)
      # is the default; desktop opens in-shell session tiles. Explicit
      # `windows.open { surface: "shell" }` still overrides for agents.
      - key: windowSurface
        kind: select
        label: Open Windows
        description: Where apps open by default — native standalone windows on the machine, or inside the Desktop.
        group: Windows
        default: standalone
        options:
          - { value: standalone, label: Standalone }
          - { value: desktop, label: Desktop }
      # Engine-owned shell surface. Off = MCP-only: the bridge stays up to
      # serve a clear "Apps disabled" page, but the desktop/apps do not mount.
      - key: ui.enabled
        kind: boolean
        label: Apps UI
        description: When off, AgentOS runs MCP-only — standalone apps show that apps are disabled instead of connecting.
        group: Runtime
        default: true
      # Engine supervises the localhost HTTP bridge (API + built SPA on :3456).
      - key: runtime.bridge
        kind: boolean
        label: Keep Bridge Running
        description: Engine keeps the web bridge (shell HTTP on port 3456) alive. Turn off only for headless MCP-only troubleshooting.
        group: Runtime
        default: true
      # Which installed browser the engine drives — sessions, page saves,
      # login windows. Options are the detected `browser` nodes the boot
      # pass seeds on System; empty pick = Automatic (the macOS default
      # browser when it's Chromium-family, else the first installed).
      - key: defaultBrowser
        kind: select
        label: Default Browser
        description: The browser the engine drives for sessions, page saves, and login windows.
        group: Browser
        optionsShape: browser
        optionsVolume: system
        optionsValue: id
        optionsLabel: name
        optionsNone: Automatic
      # Connector login cascade — OS-owned. Registry app will own a richer
      # UI later; these prefs ship on Settings ▸ System first.
      - key: autoLogin
        kind: boolean
        label: Auto Login
        description: When a connector returns NeedsAuth, automatically run its login op and retry once. Off leaves recovery to the agent.
        group: Login
        default: true
      - key: defaultCredentialProvider
        kind: select
        label: Default Credential Provider
        description: After the local vault, prefer this login_credentials provider (1Password, Keychain, …). Never required — vault always wins when it has the row.
        group: Login
        options:
          - { value: onepassword, label: 1Password }
          - { value: macos-keychain, label: macOS Keychain }
        optionsNone: Automatic
      - key: otpOrder
        kind: text
        label: OTP Channel Order
        description: Comma-separated preference for verification codes (default email, sms, whatsapp, voice). Per-account lastAuthMethod still wins when set.
        group: Login
        default: email, sms, whatsapp, voice
  prior_art:
    - source: macOS ~/Library/Application Support + Preferences
      url: https://developer.apple.com/library/archive/documentation/FileManagement/Conceptual/FileSystemProgrammingGuide/MacOSXDirectories/MacOSXDirectories.html
      notes: >-
        Direct precedent. macOS keeps per-user, per-app configuration in
        the user's home Library — portable with the home directory, one
        subdirectory per app. Our parent settings node mirrors
        Preferences (the OS defaults domain); each `--configures-->` app
        node mirrors one Application Support/<App> directory. We diverge
        by living in the graph (queryable, cascade-resolved) rather than
        plist files on disk.
    - source: XDG Base Directory ($XDG_CONFIG_HOME)
      url: https://specifications.freedesktop.org/basedir-spec/latest/
      notes: >-
        The Linux convention: user config under ~/.config/<app>,
        machine state kept separate. Same person-vs-machine seam we draw
        between this home settings store and the System-resident seat.
