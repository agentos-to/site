# An application — the one installable, launchable unit. System apps
# (Finder, Settings — engine-resident, code-only, seeded by
# `seed_system_apps()` in identity.rs) and installed apps (Python
# connectors discovered from source directories) are the same shape;
# `isSystem` and the seeding path are the only differences. Installed
# apps additionally carry connection lifecycle (`status` / `error`)
# because they adapt external platforms.
#
# What an app OFFERS the rest of the system is a `service` — see
# shapes/agentos/service.yaml. Apps link to services with `provides`
# edges (minted by the engine from the app's own declarations, never
# authored). An app may provide zero services or several.
#
# Themes never reference app ids by string literal. They reference
# role-based list ids ('primary-launcher', 'tray', 'desktop') and render
# whatever bookmarks those lists contain. Per-theme renames happen via
# the theme bundle's `appOverrides[appId] = { name?, icon? }` map — the
# theme owns presentation, not identity.
app:
  plural: apps
  identity: [id]
  display:
    subtitle: description
  fields:
    id:                string    # 'finder' / 'settings' / 'gmail' / 'exa' / ...
    name:              string    # display name (theme may override via appOverrides)
    description:       text
    color:             string    # hex color for UI display (frontmatter color)
    status:            string    # connected, disconnected, error
    error:             text      # error message if status is "error"
    iconRole:          string    # 'my-computer' / 'control-panel' / 'graph' / ...
                                  # resolves through the theme's icon registry
    route:             string    # for route-based apps (e.g. 'settings')
    defaultView:      string    # which view to spawn — usually 'main'
    isSystem:         boolean   # true → engine-resident, never uninstallable
    handles:          string[]  # shape names this app can render (e.g. Finder
                                  # declares ['*']); shells use this for the
                                  # "open this entity in…" picker. A shell
                                  # association, NOT a brokered service call.
                                  # Stored as a field, not a relation — entries
                                  # are shape names (strings), not graph
                                  # references.
    composition:      json      # which chrome rows a Navigator window wearing
                                  # this app composes. The typed owner is the
                                  # web Navigator's `Composition` interface
                                  # (core/web/src/navigator/composition.ts).
                                  # Absent → all-off (bare body under the
                                  # titlebar); an app with tools derives the
                                  # app face instead. The shell resolves,
                                  # never enumerates apps.
  links:
    provides:            service   # interfaces this app offers — minted from
                                    # the app's own declarations at load, never
                                    # authored. link_vals: {via: the bound tool}
    online_at:           website   # the platform's homepage
    privacy_at:    webpage   # privacy policy page
    terms_at:  webpage   # terms of service page
  prior_art:
    - source: macOS .app bundle (Info.plist)
      url: https://developer.apple.com/library/archive/documentation/CoreFoundation/Conceptual/CFBundles/BundleTypes/BundleTypes.html
      notes: >-
        CFBundleIdentifier ≈ id; CFBundleName ≈ name; CFBundleIconFile ≈
        iconRole (we use a role rather than a file path so themes can
        override).
    - source: freedesktop .desktop entry
      url: https://specifications.freedesktop.org/desktop-entry-spec/latest/
      notes: >-
        Name, Icon, Exec — the Linux/XDG peer. We model the launchable
        surface, not the executable (the engine knows how to spawn).
    - source: Windows AppUserModelID
      url: https://learn.microsoft.com/en-us/windows/win32/shell/appids
      notes: >-
        Stable per-app identity decoupled from the executable on disk.
        Our `id` plays the same role — themes and bookmarks reference it,
        the binary is an implementation detail of seed_system_apps().
    - source: Model Context Protocol (MCP) — Server
      url: https://modelcontextprotocol.io/specification
      notes: >-
        An installed app = an MCP-registerable provider. id ≈ MCP server
        name; status tracks connection lifecycle.
    - source: OpenAPI 3.1 (Info + Servers)
      url: https://spec.openapis.org/oas/v3.1.0
      notes: >-
        Our description/online_at/privacy_at/terms_at ≈ OpenAPI
        info.description/info.termsOfService/contact.
