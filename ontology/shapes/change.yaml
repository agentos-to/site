# A delta on something — a file born/modified/removed, a document revision,
# a changelog entry, a release note. The universal "what changed" record.
# `kind` is the FATE of the target (so a drift audit can assert existence);
# `path` (when the target is a file) lets a checker stat it.
change:
  plural: changes
  display:
    subtitle: kind
    body: summary
    highlights: [status, phase, path]
  icon: file-diff
  fields:
    kind:     string   # added | modified | removed | deprecated | fixed | security (Keep a Changelog)
    summary:  text     # one line — what the delta is
    status:   string   # built | partial | gap | later — how far along
    path:     string   # the file the change targets, when it is one (the drift-audit stats it)
    phase:    string   # groups changes into build order (schema → data → ui)
    version:  string   # the release / tag this change belongs to (semver)
  links:
    modifies:      node     # the target this change acts on (module, document, record)
    derived_from:  change   # the prior revision (PROV wasRevisionOf / git parent)
    # NB: no `made_by` — the engine auto-emits an `activity` node per mutation
    # (the audit log, edged to its target). Provenance is a system concern.
  prior_art:
    - source: PROV-O (W3C)
      url: https://www.w3.org/TR/prov-o/
      notes: >-
        wasRevisionOf / wasGeneratedBy / wasInvalidatedBy model
        born/modified/removed → kind + the derived_from edge.
    - source: Keep a Changelog 1.1.0
      url: https://keepachangelog.com/en/1.1.0/
      notes: >-
        The six categories (Added/Changed/Deprecated/Removed/Fixed/Security)
        are the canonical `kind` enum.
    - source: Conventional Commits 1.0.0 + SemVer 2.0.0
      url: https://www.conventionalcommits.org/
      notes: >-
        Commit type → impact tier (feat=minor, fix=patch, BREAKING=major);
        supplies the `version` semantics.
