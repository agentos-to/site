# A platform demands something only a human (usually) can do — scan a QR
# with a phone, click an OAuth consent, type a code that was mailed out of
# band. The challenge is a successful result, not an error: the login op
# did its job, and this is what came back. `artifact` is display-ready
# text — a Unicode QR block, a consent URL — so one string renders on
# every surface an agent lives on: a terminal, a chat, the desktop act
# window. No image pipeline, no per-surface renderer.
#
# For `code_sent` the human may not be needed at all: `instructions`
# tells the agent to try `email_lookup` providers before relaying.
auth_challenge:
  plural: auth_challenges
  display:
    subtitle: instructions
    body: artifact
  fields:
    kind:          string    # qr | code_sent | oauth_url — discriminator
    payload:       string    # raw datum — QR ref string, consent URL, masked destination
    artifact:      text      # display-ready text: Unicode QR block, or the URL itself
    instructions:  text      # what the agent does or relays (code_sent: try email_lookup first)
    expiresAt:     datetime  # rotation honesty — WhatsApp QR refs rotate ~20s
    continueWith:  string    # the op that advances the flow: a verify op, or the check op for polling
  prior_art:
    - source: OAuth 2.0 Device Authorization Grant (RFC 8628)
      url: https://datatracker.ietf.org/doc/html/rfc8628
      notes: >-
        The device flow returns the human-must-act moment as data, not as
        an error: user_code + verification_uri + expires_in, with the
        client polling the token endpoint until the human acts. Same
        anatomy here — payload/artifact ≈ user_code/verification_uri,
        expiresAt ≈ expires_in, continueWith ≈ the polling step.
    - source: whatsapp-web.js + qrcode-terminal
      url: https://github.com/pedroslopez/whatsapp-web.js
      notes: >-
        The proven precedent for QR-as-text: the linked-device QR payload
        is re-rendered as Unicode block characters in a terminal and
        scanned straight off the screen. `artifact` generalizes that to
        every text surface.
