# A named alias that expands to a location URI at parse time.
# Simple name -> target mappings. No patterns, no regex.
# Built-in shortcuts (limbo, search, help, web, files) are seeded at boot.
# Skills can register shortcuts (reddit, youtube, etc).
# Users can create, modify, or delete any shortcut.
#
# Structural input (URLs, domains, absolute paths) is handled by the normalizer
# before shortcut lookup — shortcuts don't need pattern matching.
shortcut:
  plural: shortcuts
  identity: [name]
  subtitle: target
  icon: link
  fields:
    name:             string    # e.g. "limbo", "reddit", "ppl"
    target:           string    # location URI this expands to (e.g. "person/", "website/")
    filter:           string    # optional — default query filter applied after expansion
    builtin:          boolean   # true for boot-seeded shortcuts, false for user-created
  relations:
    skill:            skill     # skill that registered this shortcut (if any)
  prior_art:
    - source: Unix shell aliases (bash/zsh)
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/alias.html
      notes: >-
        Our name→target expansion follows the alias pattern. builtin vs
        user-created parallels shell builtins vs. rc-file aliases.
    - source: Vannevar Bush — "As We May Think" (1945, associative trails)
      url: https://www.theatlantic.com/magazine/archive/1945/07/as-we-may-think/303881/
      notes: >-
        Named trails through the memex. Our named shortcut-to-URI mapping is a
        mechanized version of Bush's trail idea.
    - source: RFC 3986 URI Generic Syntax
      url: https://datatracker.ietf.org/doc/html/rfc3986
      notes: >-
        Our target is a URI (location URI). Shortcut names resolve to RFC
        3986-compliant references.
