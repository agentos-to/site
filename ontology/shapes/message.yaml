# A single message in a conversation. Base type — email extends this via `also`.
# Querying by "message" returns emails alongside iMessages, WhatsApp messages,
# Claude transcripts, etc.
message:
  plural: messages
  identity: [at, id]
  display:
    icon: chat
    subtitle: from
    preview:
      content: full        # message bodies render in full — a clipped message loses the relationship arc. Email (its own shape) keeps the default clip.
  fields:
    isOutgoing:       boolean   # true if sent by the user
    isStarred:        boolean   # user-flagged as important
    conversationId:   string    # denormalized id of the parent conversation (authoritative link is `inConversation`)
    accountEmail:     string    # which account this message belongs to — same grammar as conversation.accountEmail; a reply routes out the account the message arrived on
    isGroup:          boolean   # denormalized from the conversation — a live-watch entity must let a surface synthesize the chat row for a first-ever message without a follow-up read
    blocks:           json      # the message's typed content, in order: a list of content blocks [{kind, ...}]. ONE mechanism for human media and agent tool calls — kind ∈ text {text} · image/video/audio {path, mimeType, size?, durationMs?, filename?} · poll {question, options[]} · tool_use {id, name, input} · tool_result {tool_use_id, text}. Superset of a media-only attaches[]; the shared blocks renderer walks it for chat threads and agent transcripts alike.
  prior_art:
    - source: ActivityStreams 2.0 Note/Activity
      url: https://www.w3.org/TR/activitystreams-vocabulary/#dfn-note
      notes: >-
        Closest open standard for generic messages. Our from ≈ actor;
        inConversation ≈ context/conversation; repliesTo ≈ inReplyTo.
    - source: Matrix m.room.message
      url: https://spec.matrix.org/latest/client-server-api/#mroommessage
      notes: >-
        Practical cross-platform message event schema. Our isOutgoing has no
        Matrix analog (sender identity instead); repliesTo ≈ m.relates_to
        rel_type m.thread/m.in_reply_to.
    - source: XMPP (RFC 6121) message stanza
      url: https://datatracker.ietf.org/doc/html/rfc6121
      notes: >-
        IETF instant-messaging baseline. from/to/thread correspond to our
        from/inConversation; no standardized isStarred.
