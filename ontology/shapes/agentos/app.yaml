# A graphical app (TS/React) that runs on top of the engine — browser,
# mail, wallet, agent inbox, etc. Distinct from `skill` (Python adapters
# with no UI) and `software` (third-party apps we connect to).
#
# The engine reads app manifests from configured sources at boot and
# upserts an `app` node for each via `APP.upsert_struct(&app)`. Field
# names below match the disk-side `app.yaml` and the Rust `App` struct
# 1:1 — shape is the single contract, no translation layer.
app:
  plural: apps
  identity: [id]
  subtitle: description
  icon: app-window
  fields:
    id:               string    # slug — e.g. "browser", "mail", "agent-inbox"
    standalone:       boolean   # true when the app controls the shell;
                                # computed at load time from routes/entities.
    description:      string
    icon:             string    # per-app icon filename (relative to the app's
                                # directory). Use when the app ships its own art.
    themeIcon:        string    # semantic theme-icon name — the active theme's
                                # bundle resolves it via <ThemedIcon name=…>.
                                # Preferred over `icon` when both are set, so
                                # built-in apps stay consistent across themes.
                                # e.g. "control-panel", "user-accounts".
    entities:         json      # shape names this app renders, as JSON array
    routes:           json      # tool-activity types this app handles
    handles:          json      # capabilities this app handles for routing
    views:            json      # view definitions keyed by name
    defaultView:      string    # view to open when the app launches
    defaultToolbar:   json      # fallback toolbar config (url + search)
    menus:            json      # menu-bar definitions per app
  prior_art:
    - source: Desktop Entry Specification (freedesktop.org)
      url: https://specifications.freedesktop.org/desktop-entry-spec/latest/
      notes: >-
        Apps mirror .desktop entries — a user-facing name, a description,
        and metadata about what categories/file-types the app handles.
        Our `entities` plays the role of MimeType.
