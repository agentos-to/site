# A standing subscription — a durable intent to stream live entities, re-armed on every engine boot.
# The node stores WHICH app op arms the stream, never the artifact it
# produces (hook JS regenerates fresh on every re-arm, so it can't go
# stale on the graph). Engine boot reads these nodes and re-dispatches
# each as a normal apps.run call.
#
# One node per (app, op): subscribe upserts, close deletes, boot
# reads-and-dispatches. The node row's own updated_at IS the armed-at
# timestamp — no field duplicates it.
subscription:
  plural: subscriptions
  identity: [app, op]
  display:
    icon: notifications_active
    subtitle: target
  fields:
    app:           string    # app id the re-arm dispatches: "whatsapp"
    op:              string    # the app op that arms the stream: "watch"
    target:          string    # what is watched: "web.whatsapp.com" — display, and the key `close` deletes by
    service:         string    # transport service that armed it ("browser_session", "file_watch") — teardown dispatches its `close {target}`
  prior_art:
    - source: W3C WebSub subscriptions
      url: https://www.w3.org/TR/websub/
      notes: >-
        A subscription is a stored intent (topic + callback) the hub
        re-delivers against — content never lives on the subscription.
        Our app/op ≈ topic/callback.
    - source: MQTT persistent sessions
      url: https://docs.oasis-open.org/mqtt/mqtt/v5.0/mqtt-v5.0.html
      notes: >-
        Subscriptions survive connection loss and re-attach on
        reconnect. Our engine-boot re-arm parallels session resumption.
    - source: systemd unit enablement (systemctl enable)
      url: https://www.freedesktop.org/software/systemd/man/systemctl.html
      notes: >-
        Enablement is a durable on-disk fact distinct from the running
        process; boot re-creates the runtime state from it. Our node ≈
        the wants/ symlink, the live CDP hook ≈ the running unit.
