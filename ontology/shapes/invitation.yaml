# An invitation to join something — an organization, a workspace, a team, a
# calendar event. The universal "you're invited" primitive.
#
# Invitations have a lifecycle: pending → accepted / declined / revoked / expired.
# They cross platforms: Greptile org invites, GitHub org invites, Slack workspace
# invites, Google Calendar event invites, Linear team invites — all the same shape.
#
# Identity: [platform, id] — one node per platform+invite combo. The id is
# typically the invite token or a platform-specific invite id.
#
# invitationType is an open vocabulary — skills set whatever makes sense:
# "organization", "workspace", "team", "repository", "event", "channel", etc.
#
# Standard fields (inherited): id, name, url, image, published, content
# published = when the invitation was created/sent.
invitation:
  plural: invitations
  identity: [at, id]
  also: [event]                  # an invitation IS an event — a "you're invited" issued at a moment
  display:
    subtitle: invitationType
  fields:
    invitationType:   string    # organization, workspace, team, event, channel, etc.
    email:             string    # target email address (if email-based invite)
    role:              string    # role being offered: admin, member, viewer, etc.
    status:            string    # pending, accepted, declined, revoked, expired
    token:             string    # invite token / link token (if applicable)
                                  # When the invite expires lives on event.endDate
                                  # (inherited via `also: [event]`). Rule 1.
    acceptedAt:       datetime  # when it was accepted (own lifecycle stamp,
                                  #   legitimate under event-derived shape)
    revokedAt:        datetime  # when it was revoked (own lifecycle stamp,
                                  #   legitimate under event-derived shape)
    message:           text      # optional personal message attached to the invite
  links:
    extended_by:           account   # who sent the invite (the account that created it)
    extended_to:           account   # who is being invited (may not exist yet — email-only)
    within_org:      organization  # the org/workspace being invited into
    at_namespace:                actor    # the namespace this lives within (organization, product, software, or protocol node)
  prior_art:
    - source: ActivityStreams 2.0 Invite activity
      url: https://www.w3.org/TR/activitystreams-vocabulary/#dfn-invite
      notes: >-
        AS2 Invite is the canonical fediverse verb. Our inviter = actor;
        invitee = target; status tracks Accept/Reject/TentativeAccept
        responses.
    - source: iCalendar ATTENDEE + PARTSTAT (RFC 5545)
      url: https://datatracker.ietf.org/doc/html/rfc5545
      notes: >-
        Calendar-style invitations. Our status maps to PARTSTAT
        (NEEDS-ACTION/ACCEPTED/DECLINED/DELEGATED).
    - source: SCIM 2.0 (RFC 7644) — user provisioning
      url: https://datatracker.ietf.org/doc/html/rfc7644
      notes: >-
        Enterprise invitation/provisioning. Our email/role/organization align
        with SCIM User resource's email + entitlements + group membership.
