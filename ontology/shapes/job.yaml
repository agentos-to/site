# A running or completed unit of work the engine is responsible for —
# an agent turn, a background sync, a scheduled task. The engine creates
# one job per dispatched request and owns its full lifecycle: status,
# kind, config, and boot epoch (for crash recovery across engine restarts).
#
# Jobs are NOT tool invocations (see `tool_call`). A single job can issue
# many tool calls; a tool call belongs to exactly one job via its parent
# message.
job:
  plural: jobs
  identity: [name, boot_epoch]
  subtitle: name
  icon: play-circle
  fields:
    name:              string    # human-readable job name
    status:            string    # "running" | "completed" | "failed" | "cancelled"
    kind:              string    # discriminator — e.g. "agent", "sync"
    config:            json      # executor-specific configuration
    boot_epoch:        integer   # engine boot counter — survives restarts
  relations:
    produced:          conversation   # the thread this job writes into
    requested_by:      account        # the agent account that asked for it
  prior_art:
    - source: systemd unit — Active/Sub state machine
      url: https://www.freedesktop.org/software/systemd/man/systemd.html#Concepts
      notes: >-
        Status mirrors systemd's active/sub state pairing — our "running"
        ≈ active+running, "completed" ≈ inactive+dead, "failed" ≈
        failed+failed. boot_epoch plays the role of systemd's boot_id.
    - source: Kubernetes Job (batch/v1)
      url: https://kubernetes.io/docs/concepts/workloads/controllers/job/
      notes: >-
        Kubernetes Jobs model the same "run-once, report status, possibly
        resume" lifecycle. Our kind ≈ spec.template.spec.containers[].image;
        config ≈ spec.template.spec.
