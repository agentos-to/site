# A user review of a product. Reviews are also posts, so they carry engagement metrics.
review:
  plural: reviews
  subtitle: author
  also: [post]        # a review is also a post
  fields:
    rating:            number
    ratingMax:        number    # scale upper bound (e.g. 5, 10, 100)
    tags:              string[]
    isVerified:       boolean   # verified purchase
  relations:
    reviews:           product   # what this review is about
    postedBy:         account
  prior_art:
    - source: schema.org/Review
      url: https://schema.org/Review
      notes: >-
        Our rating ≈ reviewRating.ratingValue; ratingMax ≈ bestRating; reviews
        = itemReviewed; isVerified has no direct property (extension).
    - source: schema.org/AggregateRating
      url: https://schema.org/AggregateRating
      notes: >-
        For product review aggregates. Our rating/ratingMax map to
        ratingValue/bestRating; reviewCount is inherited when computed.
