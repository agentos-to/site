# A list — the universal ordered (or not) collection. Folders, menus,
# playlists, albums, the desktop, the tray, the primary launcher, the
# wallpapers album, agent task queues, search-result snapshots,
# Memex trails — all are `list` nodes with different listType +
# ordering_mode. One shape, one renderer dispatch, one context-menu
# router, one CLI vocabulary.
#
# `ordering_mode` is a CLOSED ENUM — the renderer branches on it:
#   linear     → vertical list (top-to-bottom) or horizontal strip;
#                 link.position = { linear: integer }
#   spatial    → icon grid (col,row → x,y in CSS px);
#                 link.position = { spatial: { col: int, row: int } }
#   unordered  → icon wrap, view-time sort via sort_by;
#                 link.position absent
#   temporal   → timeline / reverse-chrono feed;
#                 link.position = { temporal: { datetime: string } }
#
# `listType` is an OPEN STRING — **content semantics only**. What KIND
# of container: 'folder' (default, generic), 'playlist' (music linear
# queue), 'album' (music release), 'gallery' (image grid), 'shelf'
# (read-it-later), 'tag' (flat classifier), 'search-snapshot' (saved
# query results), 'task-queue', etc.
#
# Shell position is NOT a listType. The desktop, tray, launchers, and
# wallpapers folder are ALL `listType: 'folder'` with `id: 'desktop'` /
# `'tray'` / `'primary-launcher'` / `'wallpapers'`. The theme's renderer
# dispatches on `id` to apply specialized chrome (wallpaper+icons for
# id='desktop', bottom strip for id='tray', etc.) — never on listType.
# Nothing in the engine branches on listType either; it is a render hint.
list:
  plural: lists
  identity: [at, id]
  display:
    subtitle: name
  fields:
    id:                string    # 'primary-launcher' / 'wallpapers' / 'desktop' / platform list id / ...
    listId:            string    # platform list id (when imported from a third party)
    listType:          string    # OPEN STRING — semantic intent only.
    ordering_mode:    string    # CLOSED ENUM — 'linear' | 'spatial' | 'unordered' | 'temporal'.
    member_shape:     string    # OPEN STRING — optional shape constraint. Unset =
                                  # universal (mixed-shape: Bookmarks, Desktop, Recycle Bin).
                                  # Set to a shape name (e.g. 'song' for a playlist,
                                  # 'photo' for an album) → the "Add to <list>" gesture
                                  # only offers this list when the right-clicked node
                                  # matches. Display-time hint, not engine-enforced —
                                  # the contains link type permits any node.
    privacy:           string
    isDefault:        boolean   # platform-created list (e.g. "Watch Later")
    isPublic:         boolean
    itemCount:        integer   # cached count of items — derived, optional
    # view-time prefs (per-list, optional — most lists ignore)
    arrangement:       string    # serialized view-query fragment ('group=facet:shape')
                                  # — how a renderer arranges this list's members.
                                  # Folders carry their arrangements: a curated
                                  # collection (Credits) declares group=facet:shape
                                  # and renders sectioned by shape, derived never
                                  # materialized. Same grammar as a volume's
                                  # default_view; future bookmark folders and
                                  # playlists render through the same knob.
    default_view:     string    # 'icon' | 'list' | 'detail' | 'gallery'
    icon_size:        integer   # per-list view-time scale (CSS px)
    sort_by:          string    # view-time sort field (unordered lists)
    # filesystem-mirrored lists (listType: 'folder') only
    path:              string    # POSIX path when this list mirrors a real directory
  links:
    at_namespace:                actor     # namespace owner — null for system lists
    belongs_to:        account   # who owns this list — null for system lists
    contains:          node[]    # ANY addressable shape. Link vals carry per-entry
                                  # metadata: position (typed by ordering_mode),
                                  # sort_order, name_override, icon_override.
    backed_by: image     # optional — desktop wallpaper / folder backdrop
  prior_art:
    - source: schema.org/ItemList
      url: https://schema.org/ItemList
      notes: >-
        listType ≈ itemListOrder; contains ≈ itemListElement; isPublic ≈
        publicAccess.
    - source: ActivityStreams 2.0 Collection / OrderedCollection
      url: https://www.w3.org/TR/activitystreams-vocabulary/#dfn-collection
      notes: >-
        contains[] ≈ items; ordering_mode='linear' ≈ OrderedCollection,
        ordering_mode='unordered' ≈ Collection.
    - source: WinFS Item / FolderMember
      url: https://learn.microsoft.com/en-us/archive/msdn-magazine/2004/january/winfs-lets-users-search-and-manage-files-based-on-content
      notes: >-
        WinFS unified Folder + Contact + Photo under a single Item base,
        with FolderMember as a holding link. Our list-with-contains is the
        same pattern: one shape, one link mechanism, view-time projections
        handle the "I want it to look like an album" case.
    - source: Vannevar Bush — As We May Think (Memex trails)
      url: https://www.theatlantic.com/magazine/archive/1945/07/as-we-may-think/303881/
      notes: >-
        A Memex trail is a named, ordered list of associative jumps. A
        `list` with ordering_mode='linear' and contains-bookmarks IS Bush's
        trail. Foundational precedent for the everything-is-a-list thesis.
    - source: POSIX / Single Unix Specification (directories)
      url: https://pubs.opengroup.org/onlinepubs/9699919799/basedefs/V1_chap03.html
      notes: >-
        listType='folder' with optional `path` field mirrors a POSIX
        directory. The engine treats it as a list; the filesystem mirror
        is a projection, not a separate primitive.
