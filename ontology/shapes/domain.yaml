# A registered domain name. Also auto-created from email sender/recipient addresses.
domain:
  plural: domains
  display:
    subtitle: registrar
  identity: name
  fields:
    status:            string
    registrar:         string    # gandi, porkbun, etc.
    autoRenew:        boolean
    nameservers:       string[]
    # Registration and expiry dates live on the `registered_with --> registrar`
    # verb edge (`{registeredOn, expiresAt}` edge vals), not as flat fields.
    # Rule 1.
  prior_art:
    - source: RFC 1035 (Domain Names)
      url: https://datatracker.ietf.org/doc/html/rfc1035
      notes: >-
        Canonical domain-name syntax + nameservers + TTL. Our nameservers are
        NS records for the apex.
    - source: RFC 3912 (WHOIS)
      url: https://datatracker.ietf.org/doc/html/rfc3912
      notes: >-
        Our registrar/status/expiresAt/autoRenew come from WHOIS response
        fields.
