# A calendar — container for events.
calendar:
  plural: calendars
  identity: [at, calendarId]
  subtitle: source
  fields:
    calendarId:       string    # provider's calendar ID (Google: email-like string)
    color:             string    # display color (hex)
    backgroundColor:  string    # hex color for background
    foregroundColor:  string    # hex color for text
    isPrimary:        boolean
    isReadonly:       boolean
    accessRole:       string    # owner, writer, reader, freeBusyReader
    source:            string    # e.g., "iCloud", "Google"
    timezone:          string
  relations:
    at:                actor     # the namespace this calendar lives within (Google, iCloud, etc.). Required for identity.
    owner:             person    # who owns this calendar
    events:            event[]   # events in this calendar
  prior_art:
    - source: RFC 5545 VCALENDAR
      url: https://datatracker.ietf.org/doc/html/rfc5545
      notes: >-
        Our calendarId ≈ VCALENDAR's X-WR-CALID; timezone = X-WR-TIMEZONE;
        events relation mirrors VCALENDAR's VEVENT components.
    - source: CalDAV (RFC 4791)
      url: https://datatracker.ietf.org/doc/html/rfc4791
      notes: >-
        CalDAV calendar collections define accessRole semantics
        (owner/writer/reader) that match our field directly.
    - source: Google Calendar API CalendarList
      url: https://developers.google.com/calendar/api/v3/reference/calendarList
      notes: >-
        Practical API mirror. Our color/backgroundColor/foregroundColor,
        isPrimary, accessRole come from Google's CalendarList resource.
