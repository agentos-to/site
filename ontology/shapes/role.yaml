# A person's position at an organization (job title, board seat, etc.).
# Links a person to an organization with a time range.
role:
  plural: roles
  also: [event]                  # a role IS an event-shaped employment span — start / end
                                  # are event.startDate / endDate
  display:
    subtitle: name
  fields:
    title:             string
    department:        string
    roleType:         string    # employment, board, advisor, contractor, etc.
                                  # The time window is event.startDate / endDate (inherited).
  links:
    held_by:            person
    within_org:      organization
  prior_art:
    - source: schema.org/Role + OrganizationRole
      url: https://schema.org/OrganizationRole
      notes: >-
        Our title = roleName; startDate/endDate match; department ≈ name of a
        subOrganization; person/organization = Role's nested pattern.
    - source: FOAF + Bio vocabularies (position)
      url: http://vocab.org/bio/0.1/.html
      notes: >-
        Period-of-employment modeling. Our startDate/endDate ≈ bio:date;
        roleType has no FOAF peer.
