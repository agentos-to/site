# A purchasable offer — typically a flight itinerary with a price.
# An offer wraps one or more flights into a bookable unit.
offer:
  plural: offers
  identity: [id]
  also: [event]                  # an offer IS an event — a priced availability with a TTL
  display:
    icon: sell
    subtitle: price
  fields:
    price:             number
    currency:          string    # ISO 4217 (e.g. USD, EUR)
    offerType:        string
    availability:      string
                                  # Validity window lives on event.startDate / endDate
                                  # (inherited via `also: [event]`), per rule 1.
    bookingToken:     string    # opaque token for completing a booking
    departureToken:   string    # SerpAPI flights: multi-leg token for resolving a return leg price
  links:
    offered_for:               product   # what this offer is selling
    offered_by:        organization
    covers_trip:             trip[]    # the trip(s) this offer books (flights: outbound + return)
  prior_art:
    - source: schema.org/Offer
      url: https://schema.org/Offer
      notes: >-
        Our price = price; currency = priceCurrency; availability =
        availability; validFrom/validUntil match directly.
    - source: IATA NDC OfferItem
      url: https://www.iata.org/en/programs/airline-distribution/retailing/ndc/
      notes: >-
        Our bookingToken ≈ OfferItemID; validUntil ≈ TimeLimits/
        OfferExpirationDateTime; trips[] ≈ Itinerary.
    - source: schema.org/AggregateOffer
      url: https://schema.org/AggregateOffer
      notes: >-
        For price-range offers (SerpAPI flight results). offerType is
        AgentOS-specific.
