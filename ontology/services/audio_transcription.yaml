# Audio transcription — speech-to-text from an audio file. Providers wrap a
# transcription engine (whisper.cpp via Vowen, a future native macOS
# SpeechTranscriber, …). The caller names the interface, never the app —
# same shape as `llm` and `web_search`.
description: >-
  Transcribe an audio file to a timestamped text transcript. Providers
  declare which models they serve (`list_models`); `model` is a required
  input with no default — the caller picks which model transcribes. The
  spoken language is detected by the model (multilingual models) unless
  the caller forces one. Results land on the graph as a `transcript` row.
params:
  audio:    { type: "string",  doc: "Path to an audio file to transcribe." }
  model:    { type: "string?", doc: "Which transcription model to use (provider-specific id, e.g. \"medium.en\", \"large-v3\")." }
  language: { type: "string?", doc: "Spoken-language code to force, or \"auto\" to detect (default). Ignored by English-only models." }
returns: transcript
