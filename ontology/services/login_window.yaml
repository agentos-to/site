# Headed sign-in window on the engine-owned browser profile.
description: >-
  Surface the engine-owned (normally headless) browser as a headed
  Chromium app-mode window (`--app=<url>`) so a human can complete a
  login the agent can't do autonomously — SSO, MFA, CAPTCHA. One
  profile, two modes: the window runs on the same user-data-dir the
  headless session host drives, so the signed-in session is on disk
  the moment the human finishes — no cookie copying, ever.
  `login_window(url, label?)` opens the window;
  `login_window(close=true)` returns the instance to headless. Between
  the two, poll the target app's `check_session` until it reports
  authenticated. Provided by the OS browser app, which resolves
  `cdp_access` once — honoring the human's default pick — and
  dispatches the provider's fixed-name `login_window` tool, so the
  headed window always opens on the exact profile the headless
  session host drives.
