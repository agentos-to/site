# Raw protocol-level access to a debug-attachable Chromium browser.
description: >-
  Raw, protocol-level browser access. A provider returns a CDP
  WebSocket URL + target descriptor for a debug-attachable Chromium
  browser. Tiny surface: one `cdp_connect` tool, plus a fixed-name
  sibling verb every provider ships — `login_window(url, label?|close)`,
  the headed app-mode swap on the same profile, dispatched by the
  `login_window` service's provider against whichever app this service
  resolves to (never a fresh walk). Brave is today's provider;
  Chrome/Arc could join. Consumers should almost always use
  `browser_session` instead — this is the layer underneath it.
