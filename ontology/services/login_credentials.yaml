# {email|handle, password} tuple for a domain (credential provision).
description: >-
  Credential provision — an `{email|handle, password}` tuple for a
  domain, from a password manager, keychain, or vault. Wired through
  the engine's `credentials.retrieve` matchmaking, so login tools
  resolve their inputs without the LLM ever seeing raw secret values.
params:
  domain: { type: "string", doc: "Domain the login is for." }
