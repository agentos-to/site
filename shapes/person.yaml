# A real human. People are actors — they can own accounts, hold roles, attend meetings.
# Resolved from contacts, message senders, meeting attendees, etc.
#
# Name model (aligned with schema.org/Person + vCard 4.0 N property +
# Google/Apple Contacts):
#   - `givenName` / `familyName` / `additionalName` — the structured parts.
#     "given" and "family" avoid Western "first/last" assumptions: in CJK
#     names, the family name is SPOKEN FIRST.
#   - `honorificPrefix` / `honorificSuffix` — "Dr", "Jr", "III", "PhD".
#     TSA Secure Flight requires suffixes if they appear on government ID.
#   - `legalName` — the full name exactly as on government ID. Source of
#     truth for airline tickets (IATA PNR), passports (ICAO 9303). Structured
#     reconstruction is lossy (diacritics stripped, hyphens vary); keep the
#     verbatim string.
#   - `preferredName` — what the person actually wants to be called.
#     Distinct from `nickname` (casual only). Important for trans and
#     chosen-name contexts where `givenName` on ID differs from daily use.
#   - `maidenName` — cultural birth surname; used for genealogy, reunion
#     search, Spanish-system apellido materno.
#   - `sortAs` — vCard SORT-AS equivalent for last-names-with-particles
#     ("van der Harten" sorts under "H"; "de la Cruz" under "C").
#   - `nameOrder` — rendering hint: "given-family" (default) | "family-given"
#     (CJK) | "patronymic" (Russian/Icelandic).
#   - `phoneticGivenName` / `phoneticFamilyName` — Apple/Google phonetic
#     variants; matters for TTS and call-screening on non-Latin names.
#
# `name` (standard field inherited from every shape) is the display form —
# a single rendered string like "Dr. Giuseppe Efisio Contini, PhD".
person:
  plural: people
  subtitle: about
  also: [actor]       # a person is also an actor
  fields:
    # Structured name (schema.org aligned)
    givenName:        string    # "Giuseppe" — given/first in Western order
    familyName:       string    # "Contini" — family/surname (spoken first in CJK)
    additionalName:   string    # "Efisio" — middle names; comma-separated for multiples
    honorificPrefix:  string    # "Dr", "Rev", "Mx"
    honorificSuffix:  string    # "Jr", "III", "PhD", "Esq" — load-bearing for TSA/ID
    # Legal & preferred
    legalName:        string    # verbatim as on government ID (passport / driver's license)
    preferredName:    string    # what they actually want to be called (distinct from nickname)
    maidenName:       string    # cultural birth surname
    nickname:         string    # casual / informal
    # Sort & order
    sortAs:           string    # e.g. "Contini,Giuseppe" — vCard SORT-AS equivalent
    nameOrder:        string    # "given-family" | "family-given" | "patronymic"
    # Phonetics (Apple/Google Contacts)
    phoneticGivenName:  string
    phoneticFamilyName: string
    # Bio
    birthday:         datetime
    notes:            text
    gender:           string
    about:            text
  relations:
    accounts:         account[]    # platform identities this person owns
    roles:            role[]       # positions at organizations
    memberships:      membership[] # gym, subscription, club, citizenship
    passes:           pass[]       # class packs, day passes, tickets
    location:         place
    website:          website
  prior_art:
    - source: schema.org/Person
      url: https://schema.org/Person
      notes: >-
        Our givenName / familyName / additionalName / honorificPrefix /
        honorificSuffix map directly. schema.org has no `middleName`
        (additionalName is the slot); no `firstName`/`lastName` either —
        those are informal Wikipedia-style labels, not spec. birthday ≈ birthDate;
        about ≈ description. We diverge by modeling accounts[] as a first-class
        relation rather than sameAs URLs.
    - source: vCard 4.0 (RFC 6350) §6.2.2 N property + §5.9 SORT-AS
      url: https://datatracker.ietf.org/doc/html/rfc6350#section-6.2.2
      notes: >-
        The N property is `family;given;additional;prefixes;suffixes`, each
        comma-multi-valued. Our five structured fields round-trip exactly.
        sortAs mirrors RFC 6350's SORT-AS parameter for particled surnames
        ("van der Harten" sorts under H).
    - source: Google People API Name resource
      url: https://developers.google.com/people/api/rest/v1/people#Name
      notes: >-
        Google uses givenName / familyName / middleName / honorificPrefix /
        honorificSuffix + phoneticGivenName / phoneticFamilyName + displayName
        + unstructuredName. We follow the same naming, using schema.org's
        `additionalName` where Google says `middleName` (schema.org wins for
        multi-value support).
    - source: Apple CNContact
      url: https://developer.apple.com/documentation/contacts/cncontact
      notes: >-
        Apple exposes givenName / middleName / familyName + phonetic*
        variants + nameSuffix / namePrefix + previousFamilyName (≈ maidenName).
        Same shape as Google; reinforces the field set.
    - source: IATA PNR NM field + ICAO Doc 9303 (MRZ)
      url: https://en.wikipedia.org/wiki/Machine-readable_passport
      notes: >-
        Airline ticketing and passport MRZ require a specific string form
        (SURNAME/GIVENNAME TITLE, all caps, Latin-only, diacritics stripped,
        30-char limits). Structured parts can't losslessly reconstruct this;
        we store it verbatim in `legalName`.
    - source: W3C i18n — Personal names around the world
      url: https://www.w3.org/International/questions/qa-personal-names
      notes: >-
        Canonical reference for why "first/last" is a Western bias.
        CJK names put family first. Spanish uses two surnames. Icelandic
        uses patronymics without family names. The `nameOrder` field
        captures the rendering rule; structured fields stay neutral.
    - source: FOAF (Friend of a Friend)
      url: http://xmlns.com/foaf/spec/
      notes: >-
        Original social-graph vocabulary. foaf:Person with
        givenName/familyName/nick/homepage; foaf:account ≈ our accounts[].
        Largely superseded by schema.org but still a reference for
        account-centric modeling.
