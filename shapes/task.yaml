# A work item — issue, ticket, or to-do. Supports hierarchy (parent/children)
# and dependency tracking (blocked_by/blocks).
task:
  plural: tasks
  identity: [at, id]
  subtitle: state
  fields:
    remoteId:         string    # source-specific ID (e.g. PROJ-123, #456)
    priority:          integer   # 1 = highest (normalized across sources)
    state:             string
    labels:            string[]
    startedAt:        datetime
    targetDate:       datetime  # due date
  relations:
    assignedTo:       person
    project:           project
    repository:        repository
    parent:            task
    children:          task[]
    blockedBy:        task[]
    blocks:            task[]
  prior_art:
    - source: GitHub REST API — Issues
      url: https://docs.github.com/en/rest/issues/issues
      notes: >-
        Direct source. Our remoteId/state/labels/assignedTo/parent/
        children/blockedBy/blocks map to GitHub Issue + sub-issues + task-list
        tracking.
    - source: Linear GraphQL API — Issue
      url: https://developers.linear.app/docs/graphql/working-with-the-graphql-api
      notes: >-
        Practical canonical. Our priority/state/project/targetDate align with
        Linear's Issue model exactly.
    - source: Todoist REST API v2 — Tasks
      url: https://developer.todoist.com/rest/v2/
      notes: >-
        Consumer-grade task model. Our startedAt/targetDate ≈ created_at/due;
        labels match directly.
