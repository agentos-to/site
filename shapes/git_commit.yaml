# A git commit — a single point in version control history.
git_commit:
  plural: git_commits
  subtitle: author
  fields:
    sha:               string    # full 40-char SHA hash
    shortHash:        string    # abbreviated SHA (7-char)
    message:           text      # commit message
    additions:         integer   # lines added
    deletions:         integer   # lines deleted
    filesChanged:     integer
    committedAt:      datetime
  relations:
    author:            account   # who authored the commit
    committer:         account   # who committed (may differ from author)
    repository:        repository
    parent:            git_commit   # parent commit(s)
  prior_art:
    - source: Git Internals — commit object
      url: https://git-scm.com/book/en/v2/Git-Internals-Git-Objects
      notes: >-
        Our sha/shortHash/message/parent match the commit object exactly.
        author/committer follow Git's distinct author-vs-committer model.
    - source: Conventional Commits 1.0
      url: https://www.conventionalcommits.org/en/v1.0.0/
      notes: >-
        Practical structure for message field (type(scope): subject). Optional
        — we don't enforce but it's compatible.
