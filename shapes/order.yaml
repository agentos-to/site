# A purchase order. Contains products and tracks delivery.
# Used for both e-commerce (Amazon) and delivery (Uber Eats) orders.
order:
  plural: orders
  identity: [at, orderId]
  subtitle: total
  fields:
    orderId:           string    # platform order ID (e.g. "112-0527810-3136239")
    orderDate:        datetime  # when the order was placed
    total:             string    # formatted total (e.g. "$42.99")
    totalAmount:      number    # numeric total for math
    originalTotal:    string    # pre-discount total (before membership/promo savings)
    originalTotalAmount: number
    savings:           number    # total discount amount (membership + promotions)
    currency:          string
    status:            string    # draft, placed, confirmed, delivering, completed, cancelled
    deliveryDate:     datetime  # actual or estimated delivery
    eta:               string    # estimated time range (e.g. "11:33-11:53 AM")
    subtotal:          number
    tipAmount:        number
    deliveryFee:      number
    taxes:             number
    summary:           string
    fareBreakdown:    json      # line items: [{label, amount, key}]
  relations:
    at:                actor    # the namespace this lives within (organization, product, software, or protocol node)
    contains:          product[]
    shippingAddress:  place
    store:             place         # store/restaurant LOCATION (place with feature_type: poi)
    delivery:          trip          # delivery trip (Uber Eats: store → customer)
    tracking:          webpage       # carrier tracking page
  prior_art:
    - source: schema.org/Order
      url: https://schema.org/Order
      notes: >-
        Our orderId = orderNumber; orderDate = orderDate; total =
        totalPaymentDue; status = orderStatus; shippingAddress =
        orderDelivery.
    - source: schema.org/OrderStatus (enum)
      url: https://schema.org/OrderStatus
      notes: >-
        Our status values (placed, confirmed, delivering, completed,
        cancelled) map to OrderProcessing/OrderInTransit/OrderDelivered/
        OrderCancelled.
    - source: Amazon Order Reports (MWS / SP-API)
      url: https://developer-docs.amazon.com/sp-api/docs/orders-api-v0-reference
      notes: >-
        Practical source. Our orderId, fareBreakdown, savings, eta are lifted
        from Amazon/Uber Eats order structures.
