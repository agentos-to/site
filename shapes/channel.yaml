# A content channel — typically a YouTube channel. Videos are uploaded to channels.
channel:
  plural: channels
  identity: [at, id]
  fields:
    banner:            url       # channel banner/header image
  relations:
    at:                actor    # the namespace this lives within (organization, product, software, or protocol node)
  prior_art:
    - source: ActivityStreams 2.0 Collection
      url: https://www.w3.org/TR/activitystreams-vocabulary/#dfn-collection
      notes: >-
        A channel is a platform-specific Collection of media items. Our banner
        is channel branding; AS2 doesn't model that directly.
    - source: YouTube Data API — Channel resource
      url: https://developers.google.com/youtube/v3/docs/channels
      notes: >-
        Practical source. Our channel id/banner map to YouTube's channelId and
        brandingSettings.image.bannerExternalUrl.
    - source: RSS 2.0 <channel>
      url: https://www.rssboard.org/rss-specification
      notes: >-
        Original "channel" concept — a grouped feed with title, image, and
        items. Our channel is the same pattern for video.
