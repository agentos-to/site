# A generic collection of items. Base type for shelf (books) and playlist (videos).
list:
  plural: lists
  identity: [at, id]
  fields:
    listId:           string    # platform list ID (may differ from graph id)
    privacy:           string
    listType:         string
    isDefault:        boolean   # platform-created list (e.g. "Watch Later")
    isPublic:         boolean
  relations:
    at:                actor    # the namespace this lives within (organization, product, software, or protocol node)
    belongsTo:        account   # who owns this list
    contains:          product[]
  prior_art:
    - source: schema.org/ItemList
      url: https://schema.org/ItemList
      notes: >-
        Our listType ≈ itemListOrder; contains ≈ itemListElement; isPublic ≈
        publicAccess.
    - source: ActivityStreams 2.0 Collection / OrderedCollection
      url: https://www.w3.org/TR/activitystreams-vocabulary/#dfn-collection
      notes: >-
        Our contains[] ≈ items; isDefault has no AS2 peer (platform-level
        concept).
