# An MCP session — a client connected, made some calls, disconnected.
# One node per unique client+project+branch combo, updated on reconnection.
mcp_session:
  plural: mcp_sessions
  identity: [client, projectId, gitBranch]
  subtitle: client
  icon: terminal
  fields:
    client:           string    # claude-code, agentos-call, cursor, opencode
    projectId:        string    # org/repo or folder name
    gitBranch:        string
    sessionType:      string    # mcp, http, cli
    startedAt:        datetime
    endedAt:          datetime
    messageCount:     integer
    tokenCount:       integer
  relations:
    participant:       actor
    folder:            folder
  prior_art:
    - source: Model Context Protocol (MCP) session
      url: https://modelcontextprotocol.io/specification
      notes: >-
        Direct source. Our client/sessionType come from MCP's client/transport
        concepts (STDIO, HTTP+SSE).
    - source: OpenTelemetry Spans (root span ≈ session)
      url: https://opentelemetry.io/docs/concepts/signals/traces/
      notes: >-
        Our startedAt/endedAt/messageCount/tokenCount align with span
        lifecycle + attributes in a trace context.
    - source: OpenID Connect Session Management 1.0
      url: https://openid.net/specs/openid-connect-session-1_0.html
      notes: >-
        Classical web-session model. Our participant ≈ authenticated subject;
        projectId/gitBranch are AgentOS-specific scoping.
