# A physical location — address, building, city, or point of interest.
# Used for meeting locations, shipping addresses, store/restaurant locations,
# headquarters, airports, etc.
#
# Follows the Google Places / Mapbox model: a place IS the thing. A Costco
# location is a place with feature_type "poi", hours, rating, and delivery.
# The company (Costco Inc.) is an organization. The location is a place.
place:
  plural: places
  identity_any: [googlePlaceId, mapboxId]
  subtitle: fullAddress
  fields:
    # Formatted strings (pre-computed, avoid client-side formatting)
    fullAddress:      string
    placeFormatted:   string    # short display form (e.g. "Brooklyn, NY")

    # Address hierarchy (Mapbox-aligned)
    streetNumber:     string
    street:            string
    neighborhood:      string
    locality:          string    # sub-city area (e.g. borough, village)
    city:              string
    district:          string    # county or administrative area
    region:            string    # state or province
    postalCode:       string
    country:           string
    countryCode:      string    # ISO 3166-1 alpha-2 (e.g. US, GB)

    # Geospatial
    latitude:          number
    longitude:         number
    accuracy:          string    # geocoding confidence: rooftop, parcel, interpolated

    # Classification (Google Places / Mapbox aligned)
    featureType:      string    # address, poi, place, region, etc.
    categories:        string[]  # Google: types[] / primaryType (e.g. "grocery_store", "restaurant")

    # Business / POI attributes (Google Places aligned)
    # These are INTRINSIC to the place — true regardless of who's asking.
    # Contextual attributes (delivery availability, ETA, fees) depend on
    # the relationship between this place and a destination — they belong
    # on the order or query response, not the place itself.
    phone:             string    # national phone number
    website:           url       # business website
    hours:             json      # opening hours [{dayRange, sectionHours: [{startTime, endTime}]}]
    businessStatus:   string    # open, closed, temporarily_closed
    rating:            number    # 1.0-5.0
    reviewCount:      integer
    priceLevel:       string    # free, inexpensive, moderate, expensive, very_expensive
    timezone:          string    # IANA timezone (e.g. "America/Chicago")
    # Uber-Eats-specific runtime/store flags (contextual — only meaningful for stores)
    eta:               string    # estimated delivery time window ("20-30 min")
    isOrderable:      boolean   # store is currently accepting orders
    closedMessage:    string    # reason message when not orderable ("Opens at 10 AM")
    productCount:     integer   # store catalog size (loose snapshot)

    # External identifiers
    mapboxId:         string
    wikidataId:       string
    googlePlaceId:   string
  relations:
    brand:             organization  # the company this location belongs to
    offers:            product[]     # products available at this location (store catalog)
  prior_art:
    - source: schema.org/Place + PostalAddress
      url: https://schema.org/Place
      notes: >-
        Our latitude/longitude = geo.latitude/longitude;
        street/city/region/postalCode/countryCode map to PostalAddress
        streetAddress/addressLocality/addressRegion/postalCode/addressCountry;
        hours ≈ openingHoursSpecification; rating/reviewCount ≈ aggregateRating.
    - source: Google Places API (Place resource)
      url: https://developers.google.com/maps/documentation/places/web-service/reference/rest/v1/places
      notes: >-
        Practical POI schema. Our googlePlaceId = id; featureType/categories ≈
        types/primaryType; businessStatus, priceLevel, rating match directly.
    - source: GeoJSON (RFC 7946) + ISO 3166-1
      url: https://datatracker.ietf.org/doc/html/rfc7946
      notes: >-
        Our latitude/longitude are a GeoJSON Point [lon, lat]; countryCode
        follows ISO 3166-1 alpha-2.
