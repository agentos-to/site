# A purchasable item. Base type for book and aircraft.
# Cross-skill: Amazon products, Uber Eats grocery items, any retail catalog.
product:
  plural: products
  identity_any: [url]    # url is the web-canonical identifier (https://github.com, https://greptile.com)
  subtitle: brand
  fields:
    category:          string    # product category enum: marketplace, social,
                                  # messaging, productivity, finance, gaming,
                                  # media, communication, etc. Migrated from
                                  # the deleted platform.platformType.
    price:             string    # formatted price (e.g. "$29.99") — current/discounted price
    priceAmount:      number    # numeric price for math
    originalPrice:    string    # pre-discount price (e.g. "$10.99" before Uber One / Prime / sale)
    originalPriceAmount: number
    currency:          string
    categories:        string[]
    availability:      string
    images:            json
    quantity:          integer
    # Physical / grocery
    weight:            string    # formatted weight/size ("12 oz", "3 lbs", "500ml")
    weightValue:      number    # numeric weight for math
    weightUnit:       string    # oz, lb, kg, g, ml, L, ct, etc.
    soldByWeight:    boolean   # true if priced per-lb/kg (vs per-unit)
    department:        string    # top-level grocery department ("Produce", "Dairy", "Bakery")
    aisle:             string    # store aisle/section ("Fresh Fruits", "Organic Dairy")
    sku:               string    # retailer SKU / catalog UUID
    barcode:           string    # UPC/EAN barcode (from Open Food Facts)
    # Nutrition (populated via Open Food Facts enrichment)
    nutritionScore:   string    # Nutri-Score A-E
    novaGroup:        integer   # NOVA 1-4 ultra-processing level
    calories:          number    # per serving
    servingSize:      string    # "1 cup (240ml)"
    customizationGroups: json   # Uber Eats item options tree (sizes, toppings, substitutions)
  relations:
    brand:             brand
    manufacturer:      organization
    tagged:            tag[]     # dietary (VEGAN), allergens, certifications (Organic), departments
  prior_art:
    - source: schema.org/Product + Offer
      url: https://schema.org/Product
      notes: >-
        Product on schema.org, price/priceAmount/currency/availability on
        nested Offer. Our sku/barcode map to sku/gtin13/gtin12;
        brand/manufacturer match directly.
    - source: GS1 GTIN (UPC/EAN)
      url: https://www.gs1.org/standards/id-keys/gtin
      notes: >-
        Canonical barcode standard. Our barcode field is a GTIN-8/12/13/14;
        GS1 also underlies schema.org's gtin* properties.
    - source: Open Food Facts API
      url: https://openfoodfacts.github.io/openfoodfacts-server/api/
      notes: >-
        Best practical source for food attributes. Our
        nutritionScore/novaGroup/calories/servingSize mirror
        nutriscore_grade/nova_group/nutriments.energy-kcal/serving_size.
