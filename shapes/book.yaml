# A book. Books are also products, so they inherit price/brand fields.
# User-specific state (rating, shelf, dates) and platform metrics are modeled as edge values.
book:
  plural: books
  identity_any: [isbn13, isbn]
  subtitle: author
  also: [product]     # a book is also a product
  fields:
    isbn:              string    # 10-digit ISBN
    isbn13:            string    # 13-digit ISBN
    pages:             integer
    genres:            string[]
    series:            string
    format:            string    # hardcover, paperback, ebook, audiobook
    language:          string
    originalTitle:    string    # title in original language if translated
    places:            string[]  # settings/locations in the book
    characters:        string[]  # named characters
    awardsWon:        string[]
  relations:
    writtenBy:        person
    contributors:      person[]  # editors, translators, illustrators
    publisher:         organization
  prior_art:
    - source: schema.org/Book
      url: https://schema.org/Book
      notes: >-
        Our isbn maps to isbn; writtenBy = author; publisher matches; pages =
        numberOfPages; language = inLanguage; format ≈ bookFormat
        (Hardcover/Paperback/EBook).
    - source: ONIX for Books 3.0
      url: https://www.editeur.org/83/Overview/
      notes: >-
        Publishing-industry canonical. Our
        isbn/isbn13/pages/format/language/series/originalTitle align with
        ONIX Product Identifier, Extent, ProductForm, Language, Collection,
        and OriginalLanguageTitle composites.
    - source: Open Library Books API
      url: https://openlibrary.org/developers/api
      notes: >-
        Practical lookup by ISBN. Our genres/characters/places/awardsWon map
        to subjects/subject_people/subject_places/subject_times (awards less
        standardized).
